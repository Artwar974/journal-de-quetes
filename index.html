/* ================= Notifications (app ouverte) ================= */
function askNotif(){
  if(!("Notification" in window)){toast("Notifications non supportées ici");return;}
  Notification.requestPermission().then(p=>{toast(p==="granted"?"Rappels activés 🔔":"Rappels refusés");if(cur==="evenement")renderAgenda();});
}
function notify(title,body){
  if("Notification" in window && Notification.permission==="granted"){ try{new Notification(title,{body});}catch(e){} }
  toast("🔔 "+title); playSound(S.cosmetics.sound);
}
function checkSchedule(){
  const now=new Date(); let changed=false;
  S.quests.filter(x=>x.type==="evenement"&&x.time).forEach(e=>{
    const dt=new Date(e.date+"T"+e.time); const diff=dt-now;
    if(e.reminder>0 && !e.remFired && diff<=e.reminder*60000 && diff>-60000){
      e.remFired=true; changed=true; notify("Rappel : "+e.title, "C'est dans "+remLabel(e.reminder)+" ("+e.time+").");
    }
    if(!e.notified && diff<=0 && diff>-90000){
      e.notified=true; changed=true; notify("C'est l'heure : "+e.title, "Ton événement commence maintenant.");
    }
  });
  // Proposer les quêtes routine à leur heure
  S.quests.filter(x=>(x.type==="principale"||x.type==="secondaire")&&x.rec!=="oneshot"&&x.time&&!x.doneToday&&!x.abandonedToday&&!x.notifDay&&isActiveToday(x)).forEach(x=>{
    const [hh,mm]=x.time.split(":").map(Number);
    const dt=new Date(); dt.setHours(hh,mm,0,0); const diff=dt-now;
    if(diff<=0 && diff>-120000){ x.notifDay=true; changed=true; notify("C'est l'heure : "+x.title, "Ta quête t'attend ⚔️ ("+x.time+")"); }
  });
  if(changed)save();
}

/* ================= Boutique / personnalisation ================= */
function shopHTML(){
  return CATS.map(c=>{
    const items=Object.keys(c.data).map(id=>{
      const it=c.data[id];
      const owned=S.cosmetics.owned.includes(c.cat+":"+id);
      const equipped=S.cosmetics[c.cat]===id;
      const swatch = c.cat==="color" ? `<span class="swatch" style="background:${it.hex}"></span>`
        : c.cat==="aura" ? `<span class="swatch" style="background:radial-gradient(circle, ${it.c[1]} 15%, ${it.c[2]} 60%, ${it.c[3]});box-shadow:0 0 8px 2px ${it.c[2]}"></span>`
        : c.icon;
      let btn;
      if(equipped) btn=`<button class="btn go pix" disabled>✓ Équipé</button>`;
      else if(owned) btn=`<button class="btn pix" data-eq="${c.cat}:${id}">Équiper</button>`;
      else btn=`<button class="btn gold pix" data-buy="${c.cat}:${id}" ${S.coins>=it.cost?"":"disabled"}>🪙 ${it.cost}</button>`;
      return `<div class="shop-item ${equipped?"on":""}"><div class="shop-ic">${swatch}</div><div class="shop-name">${it.name}</div>${btn}</div>`;
    }).join("");
    return `<div class="shop-cat">${c.icon} ${c.label}</div><div class="shop-grid">${items}</div>`;
  }).join("");
}
function mountShop(root,rerender){
  root.innerHTML=shopHTML();
  root.querySelectorAll("[data-buy]").forEach(b=>b.onclick=()=>{const[c,i]=b.dataset.buy.split(":");if(buyItem(c,i))rerender();});

function buyItem(cat,id){
  const it=catData(cat)[id], key=cat+":"+id;
  if(S.cosmetics.owned.includes(key))return false;
  if(S.coins<it.cost){toast("Pas assez de pièces 🪙");return false;}
  S.coins-=it.cost; S.cosmetics.owned.push(key); S.cosmetics[cat]=id;
  save(); renderHUD(); playSound("piece"); celebrate(); toast("Acheté & équipé ! 🛍️");
  return true;
}
function equipItem(cat,id){
  S.cosmetics[cat]=id; save(); renderHUD();

}

const reduce=matchMedia("(prefers-reduced-motion:reduce)").matches;
function celebrate(){
  if(!reduce && !(S.settings&&!S.settings.anim)) celebrateUntil=Date.now()+1100;
  if(reduce||(S.settings&&!S.settings.anim))return;
  const eff=S.cosmetics.effect||"confettis";
  const cv=document.getElementById("confetti");cv.style.display="block";
  cv.width=innerWidth;cv.height=innerHeight;const cx=cv.getContext("2d");
  const palette={
    confettis:["#ffd056","#63d98a","#ff7a3d","#5aa9ff","#c58bff"],
    etoiles:["#ffd056","#ffffff","#ffe9a8","#5aa9ff"],
    flammes:["#ff7a3d","#ffb648","#ff5d6c","#ffd056"],
  }[eff]||["#ffd056","#63d98a","#ff7a3d","#5aa9ff","#c58bff"];
  const up=eff==="flammes";
  const originY=up?innerHeight:innerHeight/3;
  const grav=up?0.12:0.35;
  let P=[];for(let i=0;i<95;i++)P.push({
    x:innerWidth/2+(Math.random()-.5)*(up?innerWidth*.5:40), y:originY,
    vx:(Math.random()-.5)*(up?4:9), vy: up?(-6-Math.random()*7):(Math.random()*-9-3),
    s:4+Math.random()*5, c:palette[i%palette.length], r:Math.random()*6, vr:(Math.random()-.5)*.4});
  let t=0;(function loop(){t++;cx.clearRect(0,0,cv.width,cv.height);
    P.forEach(p=>{p.vy+=grav;p.x+=p.vx;p.y+=p.vy;p.r+=p.vr;
      cx.save();cx.translate(p.x,p.y);cx.rotate(p.r);cx.fillStyle=p.c;
      cx.fillRect(-p.s/2,-p.s/2,p.s,p.s);
      if(eff==="etoiles"){cx.rotate(Math.PI/4);cx.fillRect(-p.s/2,-p.s/2,p.s,p.s);}
      cx.restore();});
    if(t<95)requestAnimationFrame(loop);else cv.style.display="none";})();
}
let AC;
function playSound(id){
  if(reduce||(S.settings&&!S.settings.sound))return;
  try{AC=AC||new(window.AudioContext||window.webkitAudioContext)();
    let seq;
    if(id==="piece")seq=[[988,0],[1319,0.08]];
    else if(id==="power")seq=[[392,0],[523,0.06],[659,0.12],[784,0.18],[1047,0.24]];
    else seq=[[523.25,0],[659.25,0.09],[783.99,0.18],[1046.5,0.27]];
    seq.forEach(([f,dt])=>{const o=AC.createOscillator(),g=AC.createGain();
      o.type="square";o.frequency.value=f;o.connect(g);g.connect(AC.destination);

  }catch(e){}

/* ---- Cris personnels des créatures (style Game Boy 8-bit) ----
   Chaque créature a sa petite signature sonore : joué à la révélation d'un œuf
   et quand on touche la créature déployée au camp. */
function sfxCry(id){
  if(!sfxOn())return;
  try{AC=AC||new(window.AudioContext||window.webkitAudioContext)();
    const t0=AC.currentTime+0.02;
    /* V = une voix (onde, fréq départ→arrivée, départ, durée, volume, [vibrato hz,profondeur]) */
    const V=(type,f0,f1,dt,dur,vol,vib)=>{
      const o=AC.createOscillator(),g=AC.createGain(),t=t0+dt;
      o.type=type;o.frequency.setValueAtTime(f0,t);
      if(f1!==f0)o.frequency.exponentialRampToValueAtTime(Math.max(30,f1),t+dur);
      if(vib){const l=AC.createOscillator(),lg=AC.createGain();
        l.frequency.value=vib[0];lg.gain.value=vib[1];
        l.connect(lg);lg.connect(o.frequency);l.start(t);l.stop(t+dur+.05);}
      g.gain.setValueAtTime(.0001,t);
      g.gain.exponentialRampToValueAtTime(vol,t+0.012);
      g.gain.exponentialRampToValueAtTime(.0001,t+dur);
      o.connect(g);g.connect(AC.destination);o.start(t);o.stop(t+dur+.03);
    };
    /* N = souffle de bruit filtré (grondements, flammes, parasites robot) */
    const N=(dt,dur,vol,fq,type)=>{
      const len=Math.floor(AC.sampleRate*dur),buf=AC.createBuffer(1,len,AC.sampleRate),d=buf.getChannelData(0);
      for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,1.8);
      const s=AC.createBufferSource();s.buffer=buf;
      const f=AC.createBiquadFilter();f.type=type||"lowpass";f.frequency.value=fq;
      const g=AC.createGain();g.gain.value=vol;
      s.connect(f);f.connect(g);g.connect(AC.destination);s.start(t0+dt);
    };
    const CRIES={
      heros:  ()=>{V("square",523,523,0,.09,.15);V("square",784,784,.10,.16,.15);},           // « ta-daa » héroïque
      chat:   ()=>{V("square",620,980,0,.14,.12,[26,28]);V("square",980,430,.14,.20,.11);},   // miaou qui monte puis retombe
      robot:  ()=>{V("square",880,880,0,.07,.13);V("square",440,440,.10,.09,.13);N(.21,.05,.09,3200,"highpass");}, // bip-boup-tzt
      slime:  ()=>{V("triangle",340,150,0,.30,.17,[9,26]);V("triangle",210,120,.24,.16,.09);},// « blop » mouillé qui tremble
      renard: ()=>{V("square",760,1350,0,.09,.12);V("square",820,1450,.13,.09,.12);},         // double jappement aigu
      champi: ()=>{V("triangle",660,660,0,.09,.15);V("triangle",880,880,.11,.11,.15);V("triangle",1174,1174,.23,.11,.11);}, // trois bonds sautillants
      tigre:  ()=>{V("square",190,120,0,.30,.16,[15,18]);N(0,.28,.12,900);},                  // grondement feutré
      golem:  ()=>{V("square",95,58,0,.42,.19);N(.05,.30,.15,420);V("square",70,48,.30,.24,.12);}, // roche qui roule, très grave
      meduse: ()=>{V("sine",700,1500,0,.42,.10,[6,40]);V("triangle",1050,2100,.12,.36,.06);}, // glissando aquatique
      poussin:()=>{V("square",1500,1900,0,.07,.11);V("square",1500,1900,.13,.07,.11);},       // piou-piou
      capybara:()=>{V("triangle",520,360,0,.16,.14);V("triangle",430,330,.19,.15,.09);},      // petit couinement placide
      dragon: ()=>{V("square",240,470,0,.16,.15);V("square",470,330,.16,.14,.12);N(.27,.18,.08,2400,"bandpass");}, // cri + souffle de flamme
      phenix: ()=>{V("triangle",620,1250,0,.24,.13,[8,30]);V("triangle",1250,900,.24,.20,.11);
                   [1568,1976,2637].forEach((f,i)=>V("square",f,f,.40+i*.07,.09,.06));},      // chant qui s'élève + arpège doré
    };
    (CRIES[id]||CRIES.heros)();
  }catch(e){}
}
/* ================= Ambiance sonore du camp (jour / nuit) =================
   Un lit de vent en bruit filtré qui « respire », plus des événements espacés au
   hasard : oiseaux et bourrasques de feuilles le jour, grillons + chouette +
   tintements de lucioles la nuit. Ne joue que camp ouvert, sons activés, onglet
   visible ; bascule automatiquement avec le thème jour/nuit. */
let ambMode="",ambMaster=null,ambStops=[],ambTimers=[],ambUnlockArmed=false;
function ambNoiseBuf(){
  if(ambNoiseBuf.b)return ambNoiseBuf.b;
  const len=AC.sampleRate*2,b=AC.createBuffer(1,len,AC.sampleRate),d=b.getChannelData(0);
  for(let i=0;i<len;i++)d[i]=Math.random()*2-1;
  return ambNoiseBuf.b=b;
}
function ambTimer(fn,ms){
  const id=setTimeout(()=>{ambTimers=ambTimers.filter(x=>x!==id);fn();},ms);
  ambTimers.push(id);
}
function ambStop(){
  ambTimers.forEach(clearTimeout);ambTimers=[];
  if(ambMaster){const g=ambMaster,st=ambStops;ambMaster=null;ambStops=[];
    try{const t=AC.currentTime;
      g.gain.cancelScheduledValues(t);g.gain.setValueAtTime(Math.max(.0001,g.gain.value),t);
      g.gain.exponentialRampToValueAtTime(.0001,t+.5);          // fondu de sortie
    }catch(e){}
    setTimeout(()=>{st.forEach(n=>{try{n.stop();}catch(e){}});try{g.disconnect();}catch(e){}},600);
  }
  ambMode="";
}
function ambStart(day){
  try{
    AC=AC||new(window.AudioContext||window.webkitAudioContext)();
    if(AC.state==="suspended"){ambNeedGesture();return;}
    ambStop();ambMode=day?"day":"night";
    const master=AC.createGain();master.gain.value=.0001;master.connect(AC.destination);
    master.gain.exponentialRampToValueAtTime(1,AC.currentTime+1.4);   // fondu d'entrée
    ambMaster=master;
    const alive=()=>ambMaster===master;
    /* — lit de vent : plus clair et présent le jour, plus grave et feutré la nuit — */
    const src=AC.createBufferSource();src.buffer=ambNoiseBuf();src.loop=true;
    const f=AC.createBiquadFilter();f.type="bandpass";
    f.frequency.value=day?480:240;f.Q.value=day?.9:1.4;
    const wg=AC.createGain();wg.gain.value=day?.042:.028;
    const lfo=AC.createOscillator(),lg=AC.createGain();      // la respiration lente du vent
    lfo.frequency.value=day?.11:.07;lg.gain.value=day?.018:.011;
    lfo.connect(lg);lg.connect(wg.gain);
    src.connect(f);f.connect(wg);wg.connect(master);
    src.start();lfo.start();ambStops.push(src,lfo);
    if(day){
      /* — oiseaux : petits trilles triangulaires, panoramique aléatoire — */
      const bird=()=>{if(!alive())return;
        const t=AC.currentTime+.05,base=1500+Math.random()*900,n=2+(Math.random()*3|0);
        const pan=AC.createStereoPanner?AC.createStereoPanner():null;
        const out=pan||master;if(pan){pan.pan.value=Math.random()*1.6-.8;pan.connect(master);}
        for(let i=0;i<n;i++){
          const o=AC.createOscillator(),g=AC.createGain(),ts=t+i*(.09+Math.random()*.05);
          o.type="triangle";
          o.frequency.setValueAtTime(base+Math.random()*300,ts);
          o.frequency.exponentialRampToValueAtTime(base*(1.25+Math.random()*.2),ts+.05);
          g.gain.setValueAtTime(.0001,ts);
          g.gain.exponentialRampToValueAtTime(.045,ts+.012);
          g.gain.exponentialRampToValueAtTime(.0001,ts+.085);
          o.connect(g);g.connect(out);o.start(ts);o.stop(ts+.1);
        }
        ambTimer(bird,2600+Math.random()*5200);
      };
      ambTimer(bird,900+Math.random()*2000);
      /* — coucou lointain, deux notes descendantes — */
      const coucou=()=>{if(!alive())return;
        const t=AC.currentTime+.05;
        [[740,0],[590,.34]].forEach(([fq,dt])=>{
          const o=AC.createOscillator(),g=AC.createGain(),ts=t+dt;
          o.type="triangle";o.frequency.value=fq;
          g.gain.setValueAtTime(.0001,ts);
          g.gain.linearRampToValueAtTime(.03,ts+.04);
          g.gain.exponentialRampToValueAtTime(.0001,ts+.26);
          o.connect(g);g.connect(master);o.start(ts);o.stop(ts+.3);});
        ambTimer(coucou,18000+Math.random()*22000);
      };
      ambTimer(coucou,9000+Math.random()*12000);
      /* — bourrasque : les feuilles frémissent — */
      const rafale=()=>{if(!alive())return;
        const t=AC.currentTime+.05,dur=1.6+Math.random();
        const s2=AC.createBufferSource();s2.buffer=ambNoiseBuf();s2.loop=true;
        const f2=AC.createBiquadFilter();f2.type="highpass";f2.frequency.value=2400;
        const g2=AC.createGain();
        g2.gain.setValueAtTime(.0001,t);
        g2.gain.linearRampToValueAtTime(.016,t+dur*.45);
        g2.gain.exponentialRampToValueAtTime(.0001,t+dur);
        s2.connect(f2);f2.connect(g2);g2.connect(master);
        s2.start(t);s2.stop(t+dur+.1);
        ambTimer(rafale,11000+Math.random()*14000);
      };
      ambTimer(rafale,6000+Math.random()*8000);
    }else{
      /* — deux grillons à leur rythme propre — */
      const grillon=(fq,period,depart)=>{const go=()=>{if(!alive())return;
        const t=AC.currentTime+.05,np=3+(Math.random()*2|0);
        for(let i=0;i<np;i++){
          const o=AC.createOscillator(),g=AC.createGain(),ts=t+i*.055;
          o.type="triangle";o.frequency.value=fq+Math.random()*60;
          g.gain.setValueAtTime(.0001,ts);
          g.gain.exponentialRampToValueAtTime(.024,ts+.008);
          g.gain.exponentialRampToValueAtTime(.0001,ts+.045);
          o.connect(g);g.connect(master);o.start(ts);o.stop(ts+.06);}
        ambTimer(go,period+Math.random()*600);
      };ambTimer(go,depart);};
      grillon(4300,1150,400);grillon(3650,1750,1100);
      /* — chouette : deux « hou » doux et espacés — */
      const chouette=()=>{if(!alive())return;
        const t=AC.currentTime+.05;
        [[0,.5],[.62,.7]].forEach(([dt,dur])=>{
          const o=AC.createOscillator(),g=AC.createGain(),ts=t+dt;
          o.type="sine";o.frequency.setValueAtTime(340,ts);
          o.frequency.exponentialRampToValueAtTime(285,ts+dur);
          g.gain.setValueAtTime(.0001,ts);
          g.gain.linearRampToValueAtTime(.045,ts+.09);
          g.gain.exponentialRampToValueAtTime(.0001,ts+dur);
          o.connect(g);g.connect(master);o.start(ts);o.stop(ts+dur+.05);});
        ambTimer(chouette,16000+Math.random()*18000);
      };
      ambTimer(chouette,7000+Math.random()*9000);
      /* — tintement de luciole, très discret — */
      const luciole=()=>{if(!alive())return;
        const t=AC.currentTime+.05,o=AC.createOscillator(),g=AC.createGain();
        o.type="sine";o.frequency.value=2300+Math.random()*1200;
        g.gain.setValueAtTime(.0001,t);
        g.gain.exponentialRampToValueAtTime(.018,t+.015);
        g.gain.exponentialRampToValueAtTime(.0001,t+.5);
        o.connect(g);g.connect(master);o.start(t);o.stop(t+.55);
        ambTimer(luciole,9000+Math.random()*14000);
      };
      ambTimer(luciole,4000+Math.random()*6000);
    }
  }catch(e){}
}
/* L'autoplay est bloqué tant que l'utilisateur n'a pas touché la page :
   on retente au premier appui. */
function ambNeedGesture(){
  if(ambUnlockArmed)return;ambUnlockArmed=true;
  const h=()=>{document.removeEventListener("pointerdown",h);ambUnlockArmed=false;
    try{AC.resume().then(()=>updateAmbience());}catch(e){}};
  document.addEventListener("pointerdown",h);
}
function updateAmbience(){
  const want=launchOpen&&sfxOn()&&!document.hidden;
  if(!want){ambStop();return;}
  const m=hubDay()?"day":"night";
  if(ambMode!==m)ambStart(hubDay());
}
document.addEventListener("visibilitychange",()=>{try{updateAmbience();}catch(e){}});

/* ---- Le HUB du camp : outils de dessin pixel-art ---- */
function hubHash(i,j){let h=(i*374761393+j*668265263)|0;h=(h^(h>>13))*1274126177;h=h^(h>>16);return ((h>>>0)%1000)/1000;}
function hubTools(x){
  const R=(a,b,w,h,c)=>{x.fillStyle=c;x.fillRect(a|0,b|0,Math.max(1,w|0),Math.max(1,h|0));};
  const P=(a,b,c)=>{x.fillStyle=c;x.fillRect(a|0,b|0,1,1);};
  const P2=(a,b,c)=>{x.fillStyle=c;x.fillRect(a|0,b|0,2,2);};
  const disc=(cx,cy,r,c)=>{x.fillStyle=c;x.beginPath();x.arc(cx,cy,r,0,7);x.fill();};
  const ell=(cx,cy,rx,ry,c)=>{x.fillStyle=c;x.beginPath();x.ellipse(cx,cy,rx,ry,0,0,7);x.fill();};
  const poly=(pts,c)=>{x.fillStyle=c;x.beginPath();x.moveTo(pts[0][0],pts[0][1]);
    for(let i=1;i<pts.length;i++)x.lineTo(pts[i][0],pts[i][1]);x.closePath();x.fill();};
  const tri=(a,b,c2,d,e,f,c)=>{poly([[a,b],[c2,d],[e,f]],c);};
  const glow=(cx,cy,r,rgb,a)=>{const g=x.createRadialGradient(cx,cy,1,cx,cy,r);
    g.addColorStop(0,`rgba(${rgb},${a})`);g.addColorStop(1,`rgba(${rgb},0)`);
    x.fillStyle=g;x.fillRect(cx-r,cy-r,r*2,r*2);};
  const dith=(x0,y0,w,h,c,d,seed)=>{for(let j=0;j<h;j++)for(let i=0;i<w;i++)
    if(hubHash(x0+i+seed*7919,y0+j)<d)P(x0+i,y0+j,c);};
  return {R,P,P2,disc,ell,poly,tri,glow,dith};
}
/* Palettes jour / nuit du campement (le thème de l'app décide) */
function hubPal(day){
  return day?{

function hubQuote(){
  const d=today(); let h=0;
  for(let i=0;i<d.length;i++)h=(h*31+d.charCodeAt(i))>>>0;
  return HUB_QUOTES[h%HUB_QUOTES.length];
}
/* Transforme la phrase en nuée de points (position + phase de scintillement) */
function buildQuotePix(W,HZ){
  const q=hubQuote();
  const oc=document.createElement("canvas");oc.width=W;oc.height=Math.max(60,Math.round(HZ*0.55));
  const c=oc.getContext("2d");
  c.font='13px "Courier New",monospace';c.textAlign="center";c.textBaseline="top";
  const words=q.split(" "),lines=[];let cur="";
  words.forEach(w=>{const test=cur?cur+" "+w:w;
    if(c.measureText(test).width>298&&cur){lines.push(cur);cur=w;}else cur=test;});
  if(cur)lines.push(cur);
  /* démarre sous le soleil / la lune (centrés à ~HZ*0.163, rayon ~11) pour ne jamais les recouvrir */
  const lh=16, y0=Math.max(14,Math.round(HZ*0.245));
  c.fillStyle="#fff";
  lines.forEach((ln,i)=>c.fillText(ln,W/2,y0+i*lh));
  /* pas de tramage : on garde tous les pixels de contour (police fine, non graissée)
     pour que les lettres restent pleines et lisibles, jamais trouées */
  const img=c.getImageData(0,0,oc.width,oc.height),pts=[];
  for(let y=0;y<oc.height;y++)for(let px=0;px<oc.width;px++){
    const cov=img.data[(y*oc.width+px)*4+3]/255;   // couverture = anti-aliasing d'origine
    if(cov>0.22)
      pts.push([px,y,hubHash(px,y)*6.283,hubHash(px+7,y+3),cov]);}
  /* Ombre bleutée pré-calculée : un contour doux autour de chaque lettre, pour que
     l'écriture blanche translucide reste lisible sur le ciel clair (calculé une seule fois). */
  const sh=document.createElement("canvas");sh.width=oc.width;sh.height=oc.height;
  const s=sh.getContext("2d");
  s.font=c.font;s.textAlign="center";s.textBaseline="top";
  [[3,"rgba(10,34,68,.10)"],[2,"rgba(10,34,68,.18)"],[1,"rgba(10,34,68,.30)"]].forEach(([r,col])=>{
    s.fillStyle=col;
    for(let a=0;a<8;a++){const dx=Math.round(Math.cos(a*0.785)*r), dy=Math.round(Math.sin(a*0.785)*r);
      lines.forEach((ln,i)=>s.fillText(ln,W/2+dx,y0+i*lh+dy));}});
  /* Pré-rendus (jour et nuit) : l'écriture complète est UNE image ; à chaque frame on ne
     redessine plus que ~90 étincelles au lieu des milliers de pixels du texte. */
  const mkStill=(day2)=>{const cv=document.createElement("canvas");
    cv.width=oc.width;cv.height=oc.height;const g=cv.getContext("2d");
    pts.forEach(p2=>{const cov=p2[4];
      if(day2){g.globalAlpha=Math.min(1,cov*1.45)*.9;g.fillStyle="#eff7ff";}
      else{g.globalAlpha=Math.min(1,cov*1.3)*.86;g.fillStyle=p2[3]>.78?"#fff6d8":"#ffd76a";}
      g.fillRect(p2[0],p2[1],1,1);});
    return cv;};
  const spark=pts.filter((_,i)=>i%Math.max(1,(pts.length/90)|0)===0);
  return {pts,spark,stillD:mkStill(true),stillN:mkStill(false),text:q,cy:y0+lines.length*lh/2,shadow:sh};
}

function puddlePath(px,py,rx,ry,sd){
  const pts=[],n=14;
  for(let i=0;i<n;i++){const a=i/n*6.283;
    const wx=0.80+hubHash(sd*31+i,95)*0.38, wy=0.78+hubHash(sd*31+i,96)*0.42;
    pts.push([px+Math.cos(a)*rx*wx, py+Math.sin(a)*ry*wy]);}
  return pts;
}

function hubDrawTent(x,C,tnA,tnB){

  if(!reduce){

      /* rayons de soleil obliques, en fondu additif, qui balaient lentement la scène */

      for(let i=0;i<3;i++){

/* ---- créatures en tâche : trajet depuis le nid, puis pêche à l'étang, cuisine au feu,
   ou patrouille d'exploration le long de l'horizon. Plus elles s'éloignent dans la
   scène, plus elles rétrécissent (perspective). ---- */
function drawHubTasks(x,T,P,t,C){
  if(!S.tasks)return;
  const ids=Object.keys(S.tasks); if(!ids.length&&!HUB_DROPS.length)return;
  if((t|0)%30===0)checkTasks();
  const nestX=272, nestY=P.ndY-4;
  const ease=k=>1-(1-k)*(1-k);
  const acts=[];                                 // emprises des acteurs, pour l'occlusion
  const drawAs=(id,px,py,sc,bob,mov,face)=>{
    sc=Math.round(sc*10)/10;             // paliers de 0,1 : borne le cache d'échelles des GIF
    x.save();x.translate(px,py);x.scale(1,.32);x.translate(-px,-py);
    T.glow(px,py,6*sc,"0,0,0",.24);x.restore();
    /* ancrage : les GIF posent leurs pieds à oy+13·sc, les dessinés à ~oy+15·sc —
       on compense pour que les pieds tombent PILE sur la ligne d'ombre (py). */
    const yOff=(CREATURES[id]||{}).gif?13:15;
    paintCreature(x,id,Math.round(px-9*sc),Math.round(py-yOff*sc-(bob||0)),sc,null,null,false,mov,face);
    acts.push({x0:px-10*sc,y0:py-17*sc,x1:px+10*sc,y1:py+4*sc,fy:py});
  };
  /* ---- retours : la créature rapporte son butin de son poste jusqu'au coffre ---- */
  HUB_DROPS=HUB_DROPS.filter(d=>{
    const e2=(Date.now()-d.t0)/1000, D=5.5;
    if(e2>=D+0.9)return false;
    const st=d.tal==="peche"?[d.slot===1?P.pdX+P.pdRX+15:P.pdX-P.pdRX-15,P.pdY+9,1.15]
            :d.tal==="cuisine"?[d.slot===1?196:134,P.fireY+13,1.8]
            :[244,P.HZ+5,0.62];
    const k=Math.min(1,e2/D), K=ease(k);
    if(k<1){
      const px=st[0]+(28-st[0])*K, py=st[1]+((P.tnB+9)-st[1])*K, s2=st[2]+(1.85-st[2])*K;
      drawAs(d.id,px,py,s2,Math.round(Math.abs(Math.sin(t/3.4))*2),true,28>st[0]);   // retour = marche
    }else{ /* dépôt : étincelles dorées au-dessus du coffre */
      const p2=(e2-D)/0.9;x.globalAlpha=1-p2;
      T.P2(18+Math.sin(t/5)*4,P.tnB-6-p2*10,"#ffd873");
      T.P2(24+Math.cos(t/6)*3,P.tnB-10-p2*8,"#fff2b0");x.globalAlpha=1;
    }
    return true;});
  ids.forEach(id=>{
    const tk=S.tasks[id]; if(!tk||!CREATURES[id])return;
    const el=(Date.now()-tk.start)/1000, TRAVEL=9, slot=tk.slot||0;   // poste attitré
    const draw=(px,py,sc,bob,mov,face)=>drawAs(id,px,py,sc,bob,mov,face);
    if(tk.tal==="peche"){
      const droite=slot===1;                   // 1er pêcheur berge gauche, 2e berge droite
      const gx=droite?P.pdX+P.pdRX+15:P.pdX-P.pdRX-15, gy0=P.pdY+9;
      const k=Math.min(1,el/TRAVEL);
      const px=nestX+(gx-nestX)*ease(k), py=nestY+(gy0-nestY)*ease(k);
      const sc=2+(1.15-2)*ease(k);
      if(k>=1){ /* canne SOUS la créature, inclinée vers la mare ; le bouchon flotte DEDANS */
        const dir=droite?-1:1;
        const rx0=px, ry0=py-9,                // base, cachée par le corps
              rx1=px+12*dir, ry1=py-30;        // pointe, au-dessus, côté eau
        x.strokeStyle="#5e4028";x.lineWidth=2;
        x.beginPath();x.moveTo(rx0,ry0);x.lineTo(rx1,ry1);x.stroke();
        x.strokeStyle="#8a6a3c";x.lineWidth=1;
        x.beginPath();x.moveTo(rx0+dir,ry0);x.lineTo(rx1+dir,ry1);x.stroke();
        draw(px,py,sc,0,false,!droite);            // installé : face à l'eau (berge gauche → regarde à droite)
        const bx=P.pdX+(droite?12:-12), by=P.pdY+1+Math.round(Math.sin(t/16+slot));
        x.strokeStyle="rgba(220,230,240,.45)";x.lineWidth=1;
        x.beginPath();x.moveTo(rx1,ry1);
        x.quadraticCurveTo((rx1+bx)/2,(ry1+by)/2+8,bx,by-2);x.stroke();
        T.P2(bx-1,by-1,"#d84a3a");T.P(bx,by-2,"#f0f0e8");
        const rp=((t+slot*30)%90)/90;
        if(rp<.6){x.strokeStyle=`rgba(200,225,240,${(.5*(1-rp/.6)).toFixed(2)})`;
          x.lineWidth=1;x.beginPath();x.ellipse(bx,by+1,3+rp*8,(3+rp*8)*.35,0,0,7);x.stroke();}
      }else{
        draw(px,py,sc,Math.round(Math.abs(Math.sin(t/3.4))*2),true,gx>nestX);   // trajet vers l'étang
      }
    }else if(tk.tal==="cuisine"){
      const gx=slot===1?196:134, gy0=P.fireY+13;   // 1er cuisinier à gauche de la marmite, 2e à droite
      const k=Math.min(1,el/TRAVEL);
      const px=nestX+(gx-nestX)*ease(k), py=nestY+(gy0-nestY)*ease(k);
      const sc=2+(1.8-2)*ease(k);
      const fache=k>=1&&!S.camp.fire;   // fâché tant que le feu est éteint, calmé dès la reprise
      draw(px,py,sc,k<1?Math.round(Math.abs(Math.sin(t/3.4))*2)
        :fache?Math.round(Math.abs(Math.sin(t/2.2))*2):Math.round(Math.abs(Math.sin(t/10))),k<1||fache,k<1?gx>nestX:slot!==1);   // au gril : face à la marmite
      if(fache){ /* 💢 : le cuisinier tape du pied, symbole rouge au-dessus de la tête */
        const ax2=px+8,ay2=py-34+Math.round(Math.sin(t/3)*1);
        x.fillStyle="#e33b2c";
        x.fillRect(ax2,ay2,3,1);x.fillRect(ax2,ay2+2,3,1);
        x.fillRect(ax2-1,ay2+1,1,1);x.fillRect(ax2+3,ay2+1,1,1);
      }
      if(k>=1){ /* marmite posée sur les pierres du feu + vapeur */
        const mx=165,my=P.fireY-10;
        x.fillStyle="#23232c";x.beginPath();x.ellipse(mx,my,10,4.5,0,0,7);x.fill();
        T.R(mx-10,my-8,20,9,"#23232c");
        x.fillStyle="#3a3a46";x.beginPath();x.ellipse(mx,my-8,10,3,0,0,7);x.fill();
        x.fillStyle="#181820";x.beginPath();x.ellipse(mx,my-8,7.5,2.2,0,0,7);x.fill();
        T.R(mx-12,my-7,2,3,"#3a3a46");T.R(mx+10,my-7,2,3,"#3a3a46");
        x.fillStyle="#b8d0a0";x.beginPath();x.ellipse(mx,my-8,6,1.6,0,0,7);x.fill();
        T.P(mx-2+Math.round(Math.sin(t/9)*3),my-9,"#e0eecc");
        for(let i=0;i<3;i++){const ph=((t*0.9+i*30)%80)/80;
          x.globalAlpha=.4*(1-ph);
          T.P2(mx-4+i*4+Math.round(Math.sin(t/12+i*2)*1.5),my-13-ph*17,"#e8e8e0");}
        x.globalAlpha=1;
      }
    }else{ /* exploration : monte vers l'horizon puis longe la crête, sort et revient */
      const hy=P.HZ+5, sc=0.62, ex=244;
      const k=Math.min(1,el/12);
      if(k<1){
        const px=nestX+(ex-nestX)*ease(k), py=nestY+(hy-nestY)*ease(k);
        const s2=2+(sc-2)*ease(k);
        draw(px,py,s2,Math.round(Math.abs(Math.sin(t/3.4))*2),true,ex>nestX);   // montée vers l'horizon
      }else{
        const V=14, tp=el-12, W2=P.W+14;
        const d0=(W2-ex)/V, CROSS=(W2+14)/V, OFF=16;
        let px=null, versDroite=true;
        if(tp<d0)px=ex+tp*V;                                   // première sortie à droite
        else{const cyc=(tp-d0)%((OFF+CROSS)*2);
          if(cyc<OFF)px=null;                                  // hors cadre à droite
          else if(cyc<OFF+CROSS){px=W2-(cyc-OFF)*V;versDroite=false;} // traverse vers la gauche
          else if(cyc<OFF*2+CROSS)px=null;                     // hors cadre à gauche
          else px=-14+(cyc-OFF*2-CROSS)*V;}                    // retraverse vers la droite
        if(px!=null&&px>-12&&px<P.W+12)
          draw(px,hy,sc,Math.round(Math.abs(Math.sin(t/3.2))),true,versDroite);   // patrouille = marche
      }
    }
  });
  /* ---- occlusion : les éléments du décor repassent PAR-DESSUS les créatures qui
     passent derrière eux (uniquement si l'acteur est plus haut que leur ligne de sol) ---- */
  if(acts.length){
    const hit=(r,base)=>acts.some(a=>a.x1>r[0]&&a.x0<r[2]&&a.y1>r[1]&&a.y0<r[3]&&a.fy<base);
    if(hit([30,P.tnA-16,170,P.tnB+8],P.tnB+3))hubDrawTent(x,C,P.tnA,P.tnB);
    if(hit([202,P.bdT+16,306,P.pbB+10],P.pbB+5))hubDrawBoard(x,P.bdT,P.pbB);
    if(hit([238-HUB_SWAP,P.jnB-50,308-HUB_SWAP,P.jnB+8],P.jnB+3))hubAt(x,-HUB_SWAP,()=>hubDrawJournal(x,P.jnB));
    if(hit([26+HUB_SWAP,P.ndY-30,86+HUB_SWAP,P.ndY+14],P.ndY+9))hubAt(x,HUB_SWAP,()=>hubDrawNest(x,P.ndY));
  }
}
/* ---- feu de camp : allumer / éteindre d'une pression ---- */
function sfxFlame(on){
  if(!sfxOn())return;
  try{AC=AC||new(window.AudioContext||window.webkitAudioContext)();
    const t=AC.currentTime;
    const len=Math.floor(AC.sampleRate*(on?0.34:0.26)), buf=AC.createBuffer(1,len,AC.sampleRate), d=buf.getChannelData(0);
    for(let i=0;i<len;i++){const u=i/len;
      d[i]=(Math.random()*2-1)*(on?Math.sin(Math.PI*u)*0.9:Math.pow(1-u,1.6));}
    const src=AC.createBufferSource();src.buffer=buf;
    const f=AC.createBiquadFilter();f.type=on?"bandpass":"lowpass";
    f.frequency.setValueAtTime(on?700:900,t);
    f.frequency.exponentialRampToValueAtTime(on?2200:220,t+(on?0.3:0.24));
    const g=AC.createGain();g.gain.value=on?.3:.26;
    src.connect(f);f.connect(g);g.connect(AC.destination);src.start(t);
  }catch(e){}
}

  if(S.camp.fire||cookRelightT)return;

      sfxFlame(true);
      const id=Object.keys(S.tasks).find(k=>S.tasks[k].tal==="cuisine");
      toast(`💢 ${CREATURES[id].name} rallume le feu — sa cuisine d'abord !`);
    }},1000);

let hubWalk=null, hubSafe=null;
function hubWalkFree(P,cx,cy){
  if(cx<40||cx>292)return false;
  const boxes=[
    [126,P.fireY-40,204,P.fireY+16],   // feu
    [26+HUB_SWAP,P.ndY-30,86+HUB_SWAP,P.ndY+12],   // nid (déplacé à droite)
    [238-HUB_SWAP,P.jnB-56,308-HUB_SWAP,P.jnB+8], // journal (déplacé à gauche)
    [2,P.tnB-28,42,P.tnB+18],          // coffre à butin
    [32,P.tnA,154,P.tnB+4],            // tente
  ];
  return !boxes.some(b=>cx>b[0]&&cx<b[2]&&cy>b[1]&&cy<b[3]);

function hubPathClear(P,x0,y0,x1,y1){

  for(let i=0;i<=n;i++)if(!hubWalkFree(P,x0+(x1-x0)*i/n,y0+(y1-y0)*i/n))return false;

/* Découpe les billets en pages de la hauteur de l'écran : on fait défiler
   horizontalement d'une page à l'autre, et le compteur en bas suit. */
let tvResizeBound=false, tvDragged=false;
function tavernPaginate(){
  const pages=document.getElementById("tvPages"), pager=document.getElementById("tvPager");
  if(!pages||!pager)return;
  if(!pages._dragBound){                       // distingue la glisse de page de l'appui sur un billet
    pages._dragBound=true;
    let x0=0,y0=0,s0=0;
    pages.addEventListener("pointerdown",e=>{x0=e.clientX;y0=e.clientY;s0=pages.scrollLeft;tvDragged=false;});
    pages.addEventListener("pointerup",e=>{
      tvDragged=Math.abs(e.clientX-x0)>8||Math.abs(e.clientY-y0)>8||Math.abs(pages.scrollLeft-s0)>4;});
  }
  /* on repart toujours d'une page unique contenant tous les billets */
  const first=pages.firstElementChild;
  [...pages.children].slice(1).forEach(p=>{while(p.firstChild)first.appendChild(p.firstChild);p.remove();});
  pages.scrollLeft=0;
  const blocs=[...first.children];
  if(!blocs.length){pager.style.display="none";return;}

  pages.style.height="auto";
  const haut=pages.getBoundingClientRect().top;
  const basPris=pager.offsetHeight+40+           // compteur + marges
    [...document.querySelectorAll(".tv-foot,.tv-actions")].reduce((s,e)=>s+e.offsetHeight+16,0);
  const dispo=Math.max(200, window.innerHeight - haut - basPris);

  const GAP=11, PAD=8;
  const groupes=[[]]; let h=PAD;
  blocs.forEach(b=>{
    const bh=b.offsetHeight+GAP;
    const g=groupes[groupes.length-1];
    if(g.length && h+bh>dispo){groupes.push([b]);h=PAD+bh;}
    else{g.push(b);h+=bh;}
  });
  groupes.slice(1).forEach(g=>{
    const p=document.createElement("div");p.className="tv-page";
    g.forEach(b=>p.appendChild(b));pages.appendChild(p);
  });
  pages.style.height=dispo+"px";

  const n=groupes.length;
  if(n<2){pager.style.display="none";return;}
  pager.style.display="flex";

/* Molette de lancement (exploration ET pêche).
   Exploration : le chiffre = 🍢 embarqués (icône brochette), à droite durée + or estimé.
   Pêche : le chiffre = MINUTES de pêche (icône sablier, pas de 15 min), à droite le

function openExplChooser(id){

  const peche=CREATURES[id].tal==="peche";
  const step=peche?TASK_BASE.peche.stepMin:1;
  const minN=peche?TASK_BASE.peche.stepMin:0;

  const ov=document.createElement("div");ov.id="nsExpl";ov.className="ne-ov";
  ov.innerHTML=`<div class="ne-box">

    <div class="ne-sub">${peche

      :"Chaque 🍢 embarqué = +10 min d'exploration"}</div>
    <div class="ne-mol-row">
      <span class="ne-fic">${peche?"⏳":"🍢"}</span>
      <div class="ne-mol" id="neMol">

      :`réserve : ${maxN} 🍢 · tape ▲▼ ou glisse le chiffre`}</div>
    <div class="ne-actions">
      <button class="ne-cancel">Annuler</button>
      <button class="ne-go" id="neGo">Envoyer</button>
    </div></div>`;
  nest.appendChild(ov);
  let n=minN;
  const clamp=v=>Math.max(minN,Math.min(maxN,Math.round(v/step)*step));
  const maj=()=>{
    document.getElementById("neN").textContent=n;
    if(peche){
      document.getElementById("neDur").textContent=`≈ ${fishYield(id,n)} 🐟`;
      document.getElementById("neOr").textContent=`en ${n} min`;
    }else{
      document.getElementById("neDur").textContent=Math.round(taskDur(id,n)/60)+" min";
      document.getElementById("neOr").textContent="~"+explGain(id,n)+" 🪙";
    }
    document.getElementById("neUp").disabled=n>=maxN;
    document.getElementById("neDn").disabled=n<=minN;
  };maj();
  document.getElementById("neUp").onclick=()=>{n=clamp(n+step);maj();};
  document.getElementById("neDn").onclick=()=>{n=clamp(n-step);maj();};
  const mol=document.getElementById("neMol");
  let y0=null,n0=0;
  mol.addEventListener("pointerdown",e=>{if(e.target.tagName==="BUTTON")return;
    y0=e.clientY;n0=n;mol.setPointerCapture(e.pointerId);});
  mol.addEventListener("pointermove",e=>{if(y0==null)return;
    n=clamp(n0+Math.round((y0-e.clientY)/22)*step);maj();});
  mol.addEventListener("pointerup",()=>{y0=null;});
  ov.addEventListener("wheel",e=>{e.preventDefault();n=clamp(n+(e.deltaY<0?step:-step));maj();},{passive:false});
  ov.querySelector(".ne-cancel").onclick=()=>ov.remove();
  ov.onclick=e=>{if(e.target===ov)ov.remove();};
  document.getElementById("neGo").onclick=()=>{startTask(id,n);ov.remove();openNest();};
}

/* ---- tirage pondéré par rareté ---- */
function rollRarity(){let r=Math.random()*100,acc=0;
  for(const k of RARITY_ORDER){acc+=RARITY[k].odds;if(r<acc)return k;}return"commun";}
function pullCreature(){
  const rar=rollRarity();
  const inRar=Object.keys(CREATURES).filter(id=>CREATURES[id].rar===rar);
  const unowned=inRar.filter(id=>!S.creatures.owned.includes(id));
  const pool=unowned.length?unowned:inRar;
  const id=pool[Math.floor(Math.random()*pool.length)];
  const dup=S.creatures.owned.includes(id);
  if(!dup)S.creatures.owned.push(id);
  S.creatures.counts[id]=(S.creatures.counts[id]||0)+1;
  return {id,rar,dup};
}
function buyEgg(){
  if(S.coins<EGG_COST){toast("Pas assez de pièces 🪙");return;}
  S.coins-=EGG_COST;
  const res=pullCreature();
  if(res.dup){res.refund=Math.round(EGG_COST*0.4);S.coins+=res.refund;}
  save();renderHUD();
  playHatch(res);
}

/* ---- dessin d'un œuf (miniature + animation) ---- */
function drawEgg(x,cx,cy,sc,crackLvl,rar){
  /* Œuf « fantastique » : silhouette ovoïde (pointe en haut, ventre rond), ombrage 3D
     avec lumière en haut-gauche, taches façon œuf de dragon. Si une rareté est fournie,
     la coquille et les taches en prennent la teinte. */
  const R=rar&&RARITY[rar]?RARITY[rar]:null;
  const w=12*sc,h=17*sc;
  const mix=(a,b,k)=>{const A=parseInt(a.slice(1),16),B=parseInt(b.slice(1),16);
    const c=i=>Math.round(((A>>i&255)*(1-k))+((B>>i&255)*k));
    return `rgb(${c(16)},${c(8)},${c(0)})`;};
  const base=R?mix("#e8dcc2",R.col,.14):"#e8dcc2";
  const lit =R?mix("#f8f2e0",R.col,.08):"#f8f2e0";
  const dark=R?mix("#b6a482",R.col,.30):"#b6a482";
  const spot=R?mix("#a8895c",R.col,.55):"#a8895c";
  /* ombre de contact au sol */
  x.fillStyle="rgba(0,0,0,.30)";x.beginPath();x.ellipse(cx,cy+h*0.47,w*0.46,h*0.08,0,0,7);x.fill();
  /* silhouette ovoïde en béziers : plus étroite en haut, ventre large en bas */
  const egg=()=>{x.beginPath();
    x.moveTo(cx,cy-h*0.46);
    x.bezierCurveTo(cx+w*0.33,cy-h*0.45, cx+w*0.53,cy-h*0.08, cx+w*0.50,cy+h*0.12);
    x.bezierCurveTo(cx+w*0.47,cy+h*0.36, cx+w*0.26,cy+h*0.47, cx,cy+h*0.47);
    x.bezierCurveTo(cx-w*0.26,cy+h*0.47, cx-w*0.47,cy+h*0.36, cx-w*0.50,cy+h*0.12);
    x.bezierCurveTo(cx-w*0.53,cy-h*0.08, cx-w*0.33,cy-h*0.45, cx,cy-h*0.46);
    x.closePath();};
  /* volume : dégradé radial décentré vers la lumière */
  const g=x.createRadialGradient(cx-w*0.18,cy-h*0.16,w*0.08,cx,cy+h*0.05,h*0.64);
  g.addColorStop(0,lit);g.addColorStop(.55,base);g.addColorStop(1,dark);
  egg();x.fillStyle=g;x.fill();
  x.save();egg();x.clip();
  /* taches irrégulières qui suivent la coquille */
  const spots=[[-.13,-.02,.16,.10,.4],[.07,.15,.20,.12,.9],[-.03,.28,.13,.08,2.2],
               [.11,-.17,.11,.08,1.4],[-.12,.19,.09,.06,.7],[.01,-.31,.09,.06,2.8],[.13,.04,.08,.06,1.9]];
  spots.forEach((s,i)=>{x.globalAlpha=.42+((i*37)%30)/100;
    x.fillStyle=spot;x.beginPath();
    x.ellipse(cx+s[0]*w*2,cy+s[1]*h,s[2]*w,s[3]*h,s[4],0,7);x.fill();});
  x.globalAlpha=1;
  /* ombre interne côté droit (rondeur) + reflet spéculaire */
  const g2=x.createLinearGradient(cx-w/2,0,cx+w/2,0);
  g2.addColorStop(0,"rgba(60,40,20,0)");g2.addColorStop(.70,"rgba(60,40,20,0)");
  g2.addColorStop(1,"rgba(50,32,16,.32)");
  x.fillStyle=g2;x.fillRect(cx-w,cy-h,2*w,2*h);
  x.fillStyle="rgba(255,255,250,.8)";
  x.beginPath();x.ellipse(cx-w*0.17,cy-h*0.21,w*0.12,h*0.09,-.5,0,7);x.fill();
  x.fillStyle="rgba(255,255,250,.35)";
  x.beginPath();x.ellipse(cx-w*0.24,cy+h*0.06,w*0.06,h*0.10,.2,0,7);x.fill();
  x.restore();
  /* fissures */
  if(crackLvl>0){x.strokeStyle="#3a2416";x.lineWidth=Math.max(1,sc);
    x.beginPath();x.moveTo(cx-w*0.3,cy-h*0.2);x.lineTo(cx-w*0.05,cy);x.lineTo(cx-w*0.2,cy+h*0.12);
    if(crackLvl>1)x.lineTo(cx+w*0.05,cy+h*0.28);
    x.moveTo(cx-w*0.05,cy);x.lineTo(cx+w*0.22,cy-h*0.08);x.stroke();}
}
/* Maillet dessiné autour de son POIGNÉE (pivot à l'origine) : le manche part vers +X,
   la grosse tête est au bout. Permet de basculer de la verticale à l'horizontale. */
const MALLET_L=78;                 // longueur du manche (pivot → centre de la tête)
function drawMallet(x,pivX,pivY,ang){
  const L=MALLET_L, hw=25, hh=35;  // demi-épaisseur (axe manche) / demi-longueur de la tête
  x.save();x.translate(pivX,pivY);x.rotate(ang);
  const R=(a,b,w,h,c)=>{x.fillStyle=c;x.fillRect(a,b,w,h);};
  R(0,-6,L-20,12,"#6a4a2c");                       // manche
  R(0,-6,L-20,4,"#83603c");
  R(0,2,L-20,4,"#4f371f");
  R(-2,-8,10,16,"#4a2f1c");                        // pommeau
  R(L-hw,-hh,hw*2,hh*2,"#8a9098");                 // tête (symétrique : lisible à toute rotation)
  R(L-hw+4,-hh+4,hw*2-8,hh*2-8,"#a8aeb6");
  R(L-hw+9,-hh+9,hw*2-18,15,"#c4cad2");            // reflet
  R(L-hw,-hh,hw*2,4,"#6a707a");
  R(L-hw,hh-4,hw*2,4,"#6a707a");
  R(L-hw+2,-hh+2,5,hh*2-4,"rgba(40,44,50,.45)");   // cerclages
  R(L+hw-7,-hh+2,5,hh*2-4,"rgba(40,44,50,.45)");
  x.restore();
}
let hatchRAF=null, hatchResult=null, hatchSkip=false;
function playHatch(res){
  if(hatchRAF){cancelAnimationFrame(hatchRAF);hatchRAF=null;}   // jamais deux boucles à la fois
  hatchSkip=false;
  hatchResult=res;
  const ov=document.getElementById("hatch"), cv=document.getElementById("hatchCv");
  const card=document.getElementById("hatchCard"); card.classList.remove("show");
  ov.classList.add("on");
  const W=cv.width,H=cv.height,x=cv.getContext("2d");
  x.imageSmoothingEnabled=false;
  const R=RARITY[res.rar];
  const LV=RARITY_ORDER.indexOf(res.rar);        // 0 commun … 4 légendaire : dose tous les effets
  const showCard=()=>{
    document.getElementById("hcRar").textContent=R.name.toUpperCase();
    document.getElementById("hcRar").style.color=R.col;
    document.getElementById("hcName").textContent=CREATURES[res.id].name;
    document.getElementById("hcMsg").textContent=res.dup
      ? `Déjà dans ta collection · +${res.refund} 🪙 remboursés`
      : "Nouvelle créature débloquée !";
    const rl=document.getElementById("hcRelance");
    rl.textContent=`🥚 Relancer · ${EGG_COST}`;
    rl.disabled=S.coins<EGG_COST;                 // grisé si plus assez de pièces
    card.classList.add("show");
  };
  if(reduce){
    x.fillStyle="#000";x.fillRect(0,0,W,H);
    T_revealStatic(x,W,H,res,R);sfxCry(res.id);showCard();return;
  }
  const cx=W/2, groundY=H*0.6, sc=3;
  const pivX=cx+MALLET_L, pivY=groundY;          // pivot : la tête retombe pile sur l'œuf
  const UP=-Math.PI/2, FLAT=-Math.PI;            // manche vertical → manche horizontal
  let t0=performance.now();
  let sPoc=false,sThud=false,sMagic=false;
  const rings=[];                                // anneaux de choc au sol (rare et +)
  const ringDraw=(rr,al,lw,col)=>{x.strokeStyle=`rgba(${col},${al.toFixed(2)})`;x.lineWidth=lw;
    x.beginPath();x.ellipse(cx,groundY,rr,rr*.42,0,0,7);x.stroke();};
  const etoiles=[];                              // pluie d'étoiles dorées (légendaire)
  if(LV>=4)for(let i=0;i<26;i++)etoiles.push([(i*73)%W,-((i*97)%H),1+((i*31)%16)/10]);
  /* rayons tournants derrière la créature (épique et légendaire) */
  const rayons=(alpha,rot)=>{const nr=LV>=4?12:8;
    x.save();x.translate(cx,groundY-22);
    /* les rayons s'estompent radialement : jamais coupés net par le bord du cadre */
    const rgb=LV>=4?"255,216,115":R.rgb;
    const rg=x.createRadialGradient(0,0,16,0,0,170);
    rg.addColorStop(0,`rgba(${rgb},1)`);rg.addColorStop(.75,`rgba(${rgb},.55)`);
    rg.addColorStop(1,`rgba(${rgb},0)`);
    x.fillStyle=rg;
    for(let i=0;i<nr;i++){const a=rot+i*6.283/nr;
      x.globalAlpha=alpha+.05*Math.sin(rot*14+i);
      x.beginPath();x.moveTo(0,0);
      x.lineTo(Math.cos(a)*170,Math.sin(a)*170);
      x.lineTo(Math.cos(a+.14)*170,Math.sin(a+.14)*170);
      x.closePath();x.fill();}
    x.restore();x.globalAlpha=1;};
  const antic=(t)=>{ if(LV<1)return;            // étincelles d'anticipation autour de l'œuf
    for(let i=0;i<LV*3;i++){const a=t/160+i*6.283/(LV*3);
      x.fillStyle=i%2?R.col:"#fff";
      x.fillRect(cx+Math.cos(a)*30,groundY-8+Math.sin(a)*16,2,2);}};
  (function loop(now){
    /* tap pendant l'animation → saute directement à la révélation */
    if(hatchSkip&&!card.classList.contains("show")){hatchSkip=false;t0=Math.min(t0,now-3100);}
    const t=now-t0;
    x.fillStyle="#000";x.fillRect(0,0,W,H);
    /* halo de rareté : plus large et plus intense à haute rareté */
    const hg=Math.min(1,t/2600);
    const gr=x.createRadialGradient(cx,groundY-10,4,cx,groundY-10,Math.min(110+LV*34,168));
    gr.addColorStop(0,`rgba(${R.rgb},${(0.08+LV*0.04+(0.20+LV*0.06)*hg).toFixed(2)})`);
    gr.addColorStop(1,`rgba(${R.rgb},0)`);
    x.fillStyle=gr;x.fillRect(0,0,W,H);
    if(LV>=4){x.fillStyle="#ffd873";                       // pluie dorée légendaire
      etoiles.forEach(s=>{s[1]+=s[2];if(s[1]>H)s[1]-=H+20;
        x.globalAlpha=.30+.28*Math.sin(t/120+s[0]);x.fillRect(s[0],s[1],2,2);});
      x.globalAlpha=1;}
    if(t<900){ // chute de l'œuf, avec traînée lumineuse dès « très rare »
      const p=t/900, ey=(-60)+(groundY-(-60))*(1-(1-p)*(1-p));
      if(LV>=2){for(let i=1;i<6;i++){x.globalAlpha=.16*(1-i/6);
        x.fillStyle=R.col;x.fillRect(cx-2,ey-i*13,4,9);}x.globalAlpha=1;}
      drawEgg(x,cx,ey,sc,0,res.rar);
    }else if(t<1400){ // l'œuf se pose et vibre, le maillet se dresse
      if(!sPoc){sPoc=true;sfxPoc();}
      const q=(t-900)/500;
      const w=Math.sin((t-900)/38)*2.4*Math.max(0,1-q*1.6);
      drawEgg(x,cx+w,groundY,sc,0,res.rar);
      antic(t);
      x.save();x.globalAlpha=Math.min(1,q*2.2);x.translate(0,-70*(1-Math.min(1,q*1.5)));
      drawMallet(x,pivX,pivY,UP);x.restore();
    }else if(t<1900){ // BASCULE : de la verticale à l'horizontale
      const p=(t-1400)/500, e=p*p;
      drawEgg(x,cx,groundY,sc,p>0.75?1:0,res.rar);
      antic(t);
      drawMallet(x,pivX,pivY,UP+e*(FLAT-UP));
    }else if(t<2200){ // impact : flash CIRCULAIRE qui se diffuse depuis l'œuf
      if(!sThud){sThud=true;sfxThud();
        for(let i=0;i<1+LV;i++)rings.push({t:1900+i*80});}
      const k=(2200-t)/300, shake=k*(6+LV*2.5);
      const sx=((t/26|0)%2?shake:-shake);
      x.save();x.translate(sx,k*2);
      drawMallet(x,pivX,pivY,FLAT);
      x.restore();
      const fp=(t-1900)/300;
      const fr=Math.min(168,(60+LV*30)+fp*(150+LV*60));
      const fl=x.createRadialGradient(cx,groundY-8,0,cx,groundY-8,fr);
      fl.addColorStop(0,`rgba(255,255,255,${(.95*k).toFixed(2)})`);
      fl.addColorStop(.5,`rgba(${R.rgb},${(.55*k).toFixed(2)})`);
      fl.addColorStop(1,"rgba(255,255,255,0)");
      x.fillStyle=fl;x.fillRect(0,0,W,H);
      const nDeb=12+LV*5;                                  // débris de coquille
      for(let i=0;i<nDeb;i++){const a=i/nDeb*6.283,d=fp*(52+LV*10);
        x.fillStyle=i%3?"#e8d9b8":(LV>=3?R.col:"#c8a86a");
        x.fillRect(cx+Math.cos(a)*d,groundY+Math.sin(a)*d*0.55,3,3);}
    }else{ // le maillet se relève et sort, la créature apparaît
      const p=Math.min(1,(t-2200)/560), e=1-(1-p)*(1-p);
      if(LV>=3)rayons(.08,t/(LV>=4?900:1300));
      for(let i=0;i<10;i++){const a=i/10*6.283,d=52+p*26;
        x.globalAlpha=Math.max(0,1-p);x.fillStyle="#c8a86a";
        x.fillRect(cx+Math.cos(a)*d,groundY+Math.sin(a)*d*0.55+p*36,2,2);x.globalAlpha=1;}
      x.save();
      x.globalAlpha=Math.max(0,1-Math.max(0,(p-.55)/.45));
      x.translate(0,-e*e*250);
      drawMallet(x,pivX,pivY,FLAT+e*(UP-FLAT));
      x.restore();x.globalAlpha=1;
      const pop=Math.min(1,(t-2420)/420);
      if(pop>0){
        if(!sMagic){sMagic=true;sfxMagic();
          setTimeout(()=>{try{sfxCry(res.id);}catch(e){}},450);}   // son cri personnel, juste après le scintillement
        const csc=sc*(0.5+0.5*Math.min(1,pop*1.2))*(pop<1?1+0.15*Math.sin(t/60):1);
        const bob=Math.sin(t/200)*csc*0.4;
        paintCreature(x,res.id, cx-9*csc, groundY-15*csc+bob, csc, "happy", false);
        const nSp=6+LV*4;                                  // ronde d'étincelles dosée
        for(let i=0;i<nSp;i++){const a=t/400+i*6.283/nSp;
          x.fillStyle=i%2?R.col:"#fff";
          x.fillRect(cx+Math.cos(a)*(24+8*Math.sin(t/300)+LV*4),groundY-24+Math.sin(a)*18,2,2);}
      }
      if(t>3050 && !card.classList.contains("show"))showCard();
    }
    /* anneaux de choc qui se propagent au sol */
    rings.forEach((rg,ri)=>{const rp=(t-rg.t)/700;
      if(rp>0&&rp<1)ringDraw(20+rp*(96+LV*20),(1-rp)*.5,LV>=4?3:2,(LV>=4&&ri%2)?"255,216,115":R.rgb);});
    /* la scène tourne en boucle sous la carte : la créature continue de s'animer
       jusqu'à ce qu'on ferme ou qu'on équipe (closeHatch coupe la boucle). */
    hatchRAF=requestAnimationFrame(loop);
  })(t0);
}
function T_revealStatic(x,W,H,res,R){
  const cx=W/2,groundY=H*0.6,sc=3;
  const gr=x.createRadialGradient(cx,groundY-10,4,cx,groundY-10,120);
  gr.addColorStop(0,`rgba(${R.rgb},.32)`);gr.addColorStop(1,`rgba(${R.rgb},0)`);
  x.fillStyle=gr;x.fillRect(0,0,W,H);
  paintCreature(x,res.id,cx-9*sc,groundY-15*sc,sc,"happy",false);
}
function closeHatch(){
  const ov=document.getElementById("hatch");ov.classList.remove("on");
  if(hatchRAF){cancelAnimationFrame(hatchRAF);hatchRAF=null;}
  if(document.getElementById("nest").style.display==="block")openNest();
}
/* ================= Ouverture / fermeture du camp ================= */
function showLaunch(){
  const l=document.getElementById("launch"); if(!l)return;
  launchOpen=true; l.style.display="block";
  const cv=document.getElementById("camp");
  cv.width=330;
  cv.height=Math.max(480,Math.round(330*innerHeight/Math.max(1,innerWidth)));
  campStaticKey="";hubWalk=null;
  drawHub(0);
  placeHubSpots();updateHubPip();
  try{updateAmbience();}catch(e){}
  if(reduce)return;
  if(campRAF)cancelAnimationFrame(campRAF);
  let t=0;(function loop(){t++;drawHub(t);campRAF=requestAnimationFrame(loop);})();
}
function hideLaunch(){
  const l=document.getElementById("launch"); if(l)l.style.display="none";
  closeTavern();closeNest();
  launchOpen=false;
  try{ambStop();}catch(e){}
  if(campRAF){cancelAnimationFrame(campRAF);campRAF=null;}
}

/* ================= Boot ================= */
/* Les tâches aboutissent même quand le camp n'est pas affiché (dépôt au coffre + toast),
   et les comptes à rebours du Nid restent à jour sans re-rendu intrusif. */
setInterval(()=>{try{checkTasks();}catch(e){}},20000);
setInterval(()=>{const n=document.getElementById("nest");
  if(n&&n.style.display==="block"&&!document.getElementById("nsExpl")
     &&Date.now()-(window.nestTouchT||0)>1200)openNest();},30000);
/* favicon de l'onglet = la même icône que l'app (une seule source embarquée) */
try{const fl=document.createElement("link");fl.rel="icon";
  fl.href=document.querySelector('link[rel="apple-touch-icon"]').href;
  document.head.appendChild(fl);}catch(e){}
document.getElementById("fab").onclick=fabAction;
document.getElementById("coinsBtn").onclick=openRewards;
document.getElementById("medalBtn").onclick=()=>{cur="achievement";renderTabs();renderList();animTab();};
document.querySelector(".avatar-wrap").onclick=openAvatar;
// Swipe sur toute la page (Principales / Secondaires) — désactivé quand une fenêtre est ouverte
function swipeBlocked(){
  return document.getElementById("overlay").classList.contains("on") || launchOpen;
}
addSwipe(document,
  ()=>{ if(!swipeBlocked()&&(cur==="principale"||cur==="secondaire")&&viewDow<6){viewDow++;renderList();} },
  ()=>{ if(!swipeBlocked()&&(cur==="principale"||cur==="secondaire")&&viewDow>0){viewDow--;renderList();} });
// Animation avatar : respiration + clignement
setInterval(()=>{
  animT++;
  if(Date.now()<celebrateUntil){        // petit saut de joie
    animBob = [0,-2,-3,-1,0,-2][animT%6];
    animBlink = false;
    drawAvatar("happy");
  }else{
    animBob = Math.sin(animT/5)>0.55 ? 1 : 0;
    animBlink = (animT%26===0);
    drawAvatar();
  }
},120);
// Planificateur de rappels (quand l'app est ouverte)
checkSchedule(); setInterval(checkSchedule,20000);
document.getElementById("hcClose").onclick=closeHatch;
document.getElementById("hcRelance").onclick=()=>{
  if(S.coins<EGG_COST){toast("Pas assez de pièces 🪙");return;}
  buyEgg();                                       // relance une ouverture (paie + rejoue l'animation)
};
/* tap n'importe où sur l'overlay (hors boutons) pendant l'animation = passer l'animation */
document.getElementById("hatch").addEventListener("pointerdown",e=>{
  if(e.target.closest(".hatch-card"))return;      // les boutons gardent leur action
  if(!document.getElementById("hatchCard").classList.contains("show"))hatchSkip=true;
});
applyTheme();
renderHUD();renderTabs();renderList();
if(S.settings.splash)showLaunch();
/* Filet de sécurité : sauvegarde forcée quand l'app passe en arrière-plan ou se ferme
   (sur iOS, "pagehide"/"visibilitychange" sont les seuls signaux fiables avant fermeture) */
addEventListener("pagehide",()=>{try{save()}catch(e){}});
document.addEventListener("visibilitychange",()=>{if(document.visibilityState==="hidden"){try{save()}catch(e){}}});
</script>
