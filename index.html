<style>
  /* ======= Monde visuel : écran de menu RPG, thème sombre assumé ======= */
  :root{
    /* ===== Parchemin & Fer ===== */
    --bg:#c9ad72; --bg2:#dcc78e;
    --panel:#ecdcae; --panel-hi:#f5e9c6;
    --border:#a07b3e; --border-hi:#5e3c22;
    --ink:#3a2a12; --ink-dim:#7c5e34;
    --gold:#b07d14; --gold-deep:#8a6010;
    --green:#5a8a30; --green-deep:#3f6c22;
    --flame:#d9702a; --flame2:#e0972e;
    --red:#a8362a; --blue:#3f6f96; --plum:#8a3a6a;
    --shadow:#4a2f12;
    --inset:#d8c48c;
    --mono:"Courier New",ui-monospace,monospace;
    --sans:"Segoe UI",system-ui,-apple-system,sans-serif;
    /* Relief & texture */
    --engrave:0 1px 0 rgba(255,251,235,.55);
    --bevel-hi:rgba(255,250,230,.5);
    --bevel-lo:rgba(74,47,18,.18);
    --drop:rgba(58,42,18,.32);
    --noise:url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='90'%20height='90'%3E%3Cfilter%20id='n'%3E%3CfeTurbulence%20type='fractalNoise'%20baseFrequency='0.9'%20numOctaves='2'%20stitchTiles='stitch'/%3E%3CfeColorMatrix%20values='0%200%200%200%200%200%200%200%200%200%200%200%200%200%200%200%200%200%200.08%200'/%3E%3C/filter%3E%3Crect%20width='90'%20height='90'%20filter='url(%23n)'/%3E%3C/svg%3E");
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{height:100%}
  body{
    background:
      var(--noise),
      radial-gradient(120% 80% at 50% -10%, #e7d3a0 0%, var(--bg) 62%),
      var(--bg);
    color:var(--ink); font-family:var(--sans);
    -webkit-font-smoothing:none; image-rendering:pixelated;
    display:flex; justify-content:center;
    padding:14px; min-height:100%;
    background-attachment:fixed;
  }
  .app{width:100%;max-width:460px;display:flex;flex-direction:column;gap:12px;min-height:calc(100dvh + 4px)}

  /* Cadre "boîte de dialogue" RPG : parchemin biseauté + rivets de fer */
  .box{
    background:
      var(--noise),
      linear-gradient(160deg, rgba(255,250,225,.5) 0%, rgba(255,250,225,0) 26%, rgba(0,0,0,0) 74%, rgba(58,38,12,.10) 100%),
      var(--panel);
    border:3px solid var(--border-hi);
    box-shadow:
      inset 0 1px 0 var(--bevel-hi), inset 1px 0 0 var(--bevel-hi),
      inset 0 -2px 0 var(--bevel-lo), inset -1px 0 0 var(--bevel-lo),
      0 3px 0 var(--drop), 0 9px 18px rgba(50,32,12,.26);
    position:relative;
  }
  .box::before{
    content:""; position:absolute; inset:0;
    border:1px solid rgba(120,80,20,.25); pointer-events:none;
    background:
      radial-gradient(circle, var(--border-hi) 0 1.6px, rgba(0,0,0,0) 2.4px) no-repeat 3px 3px / 6px 6px,
      radial-gradient(circle, var(--border-hi) 0 1.6px, rgba(0,0,0,0) 2.4px) no-repeat calc(100% - 3px) 3px / 6px 6px,
      radial-gradient(circle, var(--border-hi) 0 1.6px, rgba(0,0,0,0) 2.4px) no-repeat 3px calc(100% - 3px) / 6px 6px,
      radial-gradient(circle, var(--border-hi) 0 1.6px, rgba(0,0,0,0) 2.4px) no-repeat calc(100% - 3px) calc(100% - 3px) / 6px 6px;
  }

  .pix{font-family:var(--mono);font-weight:700;text-transform:uppercase;letter-spacing:1px}

  /* ======= HUD ======= */
  .hud{padding:12px;display:flex;gap:12px;align-items:center}
  .avatar-wrap{position:relative;flex:0 0 auto;
    background:radial-gradient(circle at 50% 40%, #322614 0%, #17110a 88%);
    box-shadow:inset 0 3px 11px rgba(0,0,0,.68), inset 0 -2px 4px rgba(0,0,0,.4)}
  .avatar-wrap::after{content:"";position:absolute;inset:0;pointer-events:none;z-index:3;
    box-shadow:inset 0 0 9px 3px rgba(0,0,0,.55), inset 0 2px 3px rgba(0,0,0,.5)}
  #avatar{
    width:74px;height:74px;display:block;
    background:transparent;
    border:2px solid var(--border-hi);
    image-rendering:pixelated;
  }
  .streak-badge{
    position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);
    background:var(--flame);color:#3a1400;
    font-family:var(--mono);font-weight:700;font-size:11px;
    padding:2px 6px;border:2px solid #3a1400;white-space:nowrap;
    box-shadow:2px 2px 0 var(--shadow);
  }
  .hud-main{flex:1;min-width:0;display:flex;flex-direction:column;gap:7px}
  .hud-top{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
  .lvl{font-family:var(--mono);font-weight:700;font-size:15px;color:var(--gold)}
  .lvl small{color:var(--ink-dim);font-size:10px;letter-spacing:1px}
  .xp-num{font-family:var(--mono);font-size:11px;color:var(--ink-dim)}
  .xpbar{
    height:16px;background:var(--inset);border:2px solid var(--border);
    position:relative;overflow:hidden;
    box-shadow:inset 0 2px 4px rgba(30,18,6,.35), 0 1px 0 var(--bevel-hi);
  }
  .xpfill{
    height:100%;width:0%;
    background:repeating-linear-gradient(90deg,var(--gold) 0 6px,var(--gold-deep) 6px 8px);
    transition:width .5s cubic-bezier(.2,.8,.2,1);
    box-shadow:inset 0 -4px 0 rgba(0,0,0,.25),inset 0 3px 0 rgba(255,255,255,.25);
  }
  .mult{
    font-family:var(--mono);font-weight:700;font-size:11px;
    color:var(--flame2);display:flex;align-items:center;gap:4px
  }

  /* ======= Liste de quêtes ======= */
  .list-head{display:flex;justify-content:space-between;align-items:center;padding:2px 2px}
  .list-title{font-family:var(--mono);font-weight:700;text-transform:uppercase;
    letter-spacing:1px;font-size:12px;color:var(--ink);
    display:flex;align-items:center;gap:8px}
  .list-title::after{content:"";flex:1;height:2px;min-width:14px;
    background:linear-gradient(90deg,var(--border) 0 55%,rgba(0,0,0,0));
    box-shadow:0 1px 0 var(--bevel-hi)}
  .list-title:empty{display:none}
  .list-sub{font-size:11px;color:var(--ink-dim)}
  .quests{display:flex;flex-direction:column;gap:9px}

  .quest{
    padding:11px 12px;display:flex;gap:11px;align-items:flex-start;
    animation:pop .18s ease;
  }
  @keyframes pop{from{transform:scale(.97);opacity:.4}to{transform:scale(1);opacity:1}}
  .q-ic{
    flex:0 0 auto;width:38px;height:38px;display:grid;place-items:center;
    font-size:20px;border:2px solid var(--border);
    background:linear-gradient(180deg, rgba(0,0,0,.10), rgba(0,0,0,0) 40%), var(--inset);
    box-shadow:inset 0 2px 3px rgba(58,38,12,.22), 0 1px 0 var(--bevel-hi);
  }
  .q-body{flex:1;min-width:0}
  .q-title{font-weight:600;font-size:15px;line-height:1.2;margin-bottom:3px}
  .q-meta{display:flex;flex-wrap:wrap;gap:5px;align-items:center}
  .chip{
    font-family:var(--mono);font-size:9px;font-weight:700;text-transform:uppercase;
    letter-spacing:.5px;padding:2px 5px;border:1px solid var(--border);
    color:var(--ink-dim);background:var(--bg2);
  }
  .chip.gold{color:var(--gold);border-color:var(--gold-deep)}
  .chip.blue{color:var(--blue);border-color:var(--blue)}
  .chip.plum{color:var(--plum);border-color:var(--plum)}
  .q-actions{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}

  .btn{
    font-family:var(--mono);font-weight:700;font-size:11px;text-transform:uppercase;
    letter-spacing:.5px;padding:7px 10px;cursor:pointer;color:var(--ink);
    background:var(--panel-hi);border:2px solid var(--border-hi);
    box-shadow:2px 2px 0 var(--shadow);transition:.06s;
  }
  .btn:hover{transform:translate(-1px,-1px);box-shadow:3px 3px 0 var(--shadow)}
  .btn:active{transform:translate(1px,1px);box-shadow:1px 1px 0 var(--shadow)}
  .btn.go{background:var(--green-deep);border-color:var(--green);color:#eafff1}
  .btn.gold{background:var(--gold-deep);border-color:var(--gold);color:#fbf0d0}
  .btn.no{background:#5a2233;border-color:var(--red);color:#ffdfe4}
  .btn.ghost{background:transparent;border-color:var(--border);color:var(--ink-dim);box-shadow:none}
  .btn.wide{width:100%;justify-content:center;display:flex;padding:11px}
  .btn:disabled{opacity:.4;cursor:not-allowed}

  .empty{
    text-align:center;padding:34px 16px;color:var(--ink-dim);font-size:13px;
  }
  .empty .big{font-size:34px;display:block;margin-bottom:8px;opacity:.7}

  /* Événement : compte à rebours */
  .countdown{font-family:var(--mono);font-weight:700;color:var(--blue);font-size:12px}

  /* ======= Modale ======= */
  .overlay{
    position:fixed;inset:0;background:rgba(6,4,12,.82);z-index:40;
    display:none;align-items:center;justify-content:center;padding:16px;
    backdrop-filter:blur(1px);
  }
  .overlay.on{display:flex}
  .modal{width:100%;max-width:400px;max-height:88vh;overflow-y:auto;padding:16px;
    background:
      var(--noise),
      linear-gradient(160deg, rgba(255,250,225,.5) 0%, rgba(255,250,225,0) 26%, rgba(0,0,0,0) 74%, rgba(58,38,12,.10) 100%),
      var(--panel);
    border:3px solid var(--border-hi);
    box-shadow:
      inset 0 1px 0 var(--bevel-hi), inset 0 -2px 0 var(--bevel-lo),
      0 0 0 1px rgba(120,80,20,.25) inset,
      0 6px 0 rgba(0,0,0,.22), 0 18px 44px rgba(0,0,0,.5)}
  .modal h2{font-family:var(--mono);text-transform:uppercase;letter-spacing:1px;
    font-size:15px;margin-bottom:6px;color:var(--gold);
    padding-bottom:6px;border-bottom:2px solid var(--border);
    display:flex;align-items:center;gap:8px}
  .modal h2::after{content:"❖";flex:0 0 auto;margin-left:auto;font-size:10px;color:var(--border);text-shadow:none}
  .modal p.hint{font-size:12px;color:var(--ink-dim);margin-bottom:14px}
  .field{margin-bottom:9px}
  .field label{display:block;font-family:var(--mono);font-size:10px;text-transform:uppercase;
    letter-spacing:1px;color:var(--ink-dim);margin-bottom:5px}
  .field input,.field select{
    width:100%;padding:9px;background:var(--inset);border:2px solid var(--border);
    color:var(--ink);font-family:var(--sans);font-size:14px;
  }
  .field input:focus,.field select:focus{outline:none;border-color:var(--gold)}
  .icon-row{display:flex;flex-wrap:wrap;gap:6px}
  .icon-pick{width:32px;height:32px;font-size:17px;display:grid;place-items:center;
    background:var(--inset);border:2px solid var(--border);cursor:pointer}
  .icon-pick.on{border-color:var(--gold);background:var(--panel-hi)}
  .modal-actions{display:flex;gap:8px;margin-top:6px}
  .modal-actions .btn{flex:1;justify-content:center;display:flex}

  /* Chrono */
  .timer-display{font-family:var(--mono);font-weight:700;font-size:46px;text-align:center;
    color:var(--gold);letter-spacing:2px;margin:6px 0 2px;font-variant-numeric:tabular-nums}
  .timer-target{text-align:center;font-family:var(--mono);font-size:11px;color:var(--ink-dim);margin-bottom:14px}
  .timer-ring{height:12px;background:var(--inset);border:2px solid var(--border);margin-bottom:16px;overflow:hidden}
  .timer-ring>i{display:block;height:100%;width:0%;background:var(--green);transition:width 1s linear}

  /* Notation étoiles */
  .stars{display:flex;justify-content:center;gap:6px;margin:6px 0 16px}
  .star{font-size:34px;cursor:pointer;color:var(--gold);line-height:1;transition:.08s;
    text-shadow:0 1px 0 rgba(0,0,0,.15)}
  .star.on{transform:scale(1.12)}
  .rate-label{text-align:center;font-size:12px;color:var(--ink-dim);min-height:16px;margin-bottom:12px}

  #confetti{position:fixed;inset:0;pointer-events:none;z-index:50;display:none}
  .foot{text-align:center;font-size:10px;color:var(--ink-dim);font-family:var(--mono);
    letter-spacing:1px;padding:4px 0 2px;opacity:.7}

  /* ======= Avatar : curseur + cadres achetables ======= */
  .avatar-wrap{cursor:pointer}
  #avatar.fr-gold{border-color:var(--gold);box-shadow:0 0 0 2px var(--gold-deep)}
  #avatar.fr-neon{border-color:#5ad6d6;box-shadow:0 0 10px #5ad6d6,0 0 0 2px #2a6a6a,inset 0 0 5px 1px #5ad6d6}
  /* quand le cadre néon est équipé, le vignettage devient une lueur cyan intérieure */
  .avatar-wrap:has(.fr-neon)::after{box-shadow:inset 0 0 6px 1px rgba(90,214,214,.6),inset 0 2px 4px rgba(0,0,0,.35)}
  #avatar.fr-royal{border-color:var(--plum);box-shadow:0 0 0 2px #6a3a9a,0 0 0 4px var(--gold-deep)}

  /* ======= Agenda / calendrier ======= */
  .cal{border:2px solid var(--border);padding:8px;
    background:var(--noise), var(--bg2);
    box-shadow:inset 0 2px 6px rgba(58,38,12,.16), 0 2px 0 var(--drop)}
  .cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .cal-title{font-family:var(--mono);font-weight:700;text-transform:uppercase;
    letter-spacing:1px;font-size:13px;color:var(--gold)}
  .cal-head .btn{padding:5px 11px}
  .cal-dow{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px}
  .cal-dow span{text-align:center;font-family:var(--mono);font-size:9px;color:var(--ink-dim)}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
  .cal-cell{aspect-ratio:1;background:var(--inset);border:1px solid var(--border);position:relative;
    display:flex;align-items:flex-start;justify-content:flex-end;padding:2px 3px;
    font-size:11px;cursor:pointer;font-variant-numeric:tabular-nums;color:var(--ink)}
  .cal-cell.other{background:transparent;border-color:transparent;cursor:default}
  .cal-cell:hover:not(.other){border-color:var(--gold)}
  .cal-cell.today{border-color:var(--gold);color:var(--gold);box-shadow:inset 0 0 0 1px var(--gold-deep)}
  .cal-cell.has{background:#f0c184;color:#4a2f12}
  .cal-dots{position:absolute;bottom:2px;left:3px;display:flex;gap:2px}
  .cal-dots i{width:4px;height:4px;background:var(--blue)}
  /* Routine de la semaine */
  .wk-day{display:flex;gap:8px;border:2px solid var(--border);background:var(--bg2);margin-bottom:6px;padding:7px 9px}
  .wk-day.today{border-color:var(--gold);box-shadow:inset 0 0 0 1px var(--gold-deep)}
  .wk-name{flex:0 0 62px;font-family:var(--mono);font-weight:700;font-size:10px;text-transform:uppercase;
    letter-spacing:.5px;color:var(--ink-dim);padding-top:2px}
  .wk-day.today .wk-name{color:var(--gold)}
  .wk-list{flex:1;min-width:0;display:flex;flex-direction:column;gap:4px}
  .wk-item{font-size:12px;padding:3px 6px;background:var(--panel);border:1px solid var(--border);cursor:pointer;line-height:1.3}
  .wk-item:hover{border-color:var(--gold)}
  .wk-item b{font-family:var(--mono);color:var(--gold);font-size:11px}
  .wk-item.ev{border-color:var(--blue)}
  .wk-item.ev b{color:var(--blue)}
  .wk-tag{font-family:var(--mono);font-weight:700;font-size:8px;text-transform:uppercase;letter-spacing:.3px;
    padding:1px 4px;border:1px solid var(--border);white-space:nowrap}
  .wk-tag.p{color:var(--gold);border-color:var(--gold-deep)}
  .wk-tag.s{color:var(--plum);border-color:var(--plum)}
  .wk-empty{font-size:11px;color:var(--ink-dim);font-style:italic;padding:2px 4px}

  /* Navigation jour par jour + cartes de statut */
  .day-nav{display:flex;align-items:center;gap:8px;margin-bottom:10px}
  .day-nav .btn{padding:6px 12px}
  .day-lbl{flex:1;text-align:center;font-family:var(--mono);font-weight:700;text-transform:uppercase;
    letter-spacing:.5px;font-size:12px;color:var(--ink-dim)}
  .day-lbl.now{color:var(--gold)}
  .quest .sc-badge{font-family:var(--mono);font-weight:700;font-size:22px;align-self:center;padding-left:4px;flex:0 0 auto}
  .quest.sc-done{border-color:var(--gold)}
  .quest.sc-done .sc-badge{color:var(--gold)}
  .quest.sc-abandoned,.quest.sc-notdone{opacity:.55}
  .quest.sc-abandoned .sc-badge,.quest.sc-notdone .sc-badge{color:var(--red)}
  .quest.sc-preview{opacity:.75;border-style:dashed}
  .quest.sc-preview .sc-badge{color:var(--ink-dim)}

  /* Sous-onglets (History) */
  .subtabs{display:flex;gap:6px;margin-bottom:12px}
  .subtab{flex:1;background:var(--bg2);border:2px solid var(--border);color:var(--ink-dim);
    font-family:var(--mono);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.5px;
    padding:9px 4px;cursor:pointer;transition:.08s}
  .subtab.on{background:var(--panel-hi);border-color:var(--gold);color:var(--gold);box-shadow:0 3px 0 var(--gold-deep)}

  /* Achievements */
  .quest.sc-achiev{border-color:var(--plum);
    box-shadow:inset 0 1px 0 var(--bevel-hi), inset 0 -2px 0 var(--bevel-lo),
      0 3px 0 var(--drop), 0 9px 18px rgba(50,32,12,.26), 0 0 12px rgba(197,139,255,.35)}
  .badge-shelf{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .badge{background:var(--bg2);border:2px solid var(--gold);padding:10px 6px;text-align:center;cursor:pointer;
    box-shadow:0 0 8px rgba(255,208,86,.2)}
  .badge-ic{font-size:30px;line-height:1}
  .badge-t{font-size:9px;color:var(--ink-dim);margin-top:5px;line-height:1.2}
  .stats-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
  .stat{background:var(--bg2);border:2px solid var(--border);padding:12px 8px;text-align:center}
  .stat-n{font-family:var(--mono);font-weight:700;font-size:24px;color:var(--gold);font-variant-numeric:tabular-nums}
  .stat-l{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-dim);margin-top:4px}

  /* ======= Boutique ======= */
  .shop-cat{font-family:var(--mono);font-weight:700;text-transform:uppercase;letter-spacing:1px;
    font-size:11px;color:var(--gold);margin:14px 0 8px}
  .shop-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
  .shop-item{background:var(--bg2);border:2px solid var(--border);padding:9px;display:flex;
    flex-direction:column;align-items:center;gap:6px;text-align:center}
  .shop-item.on{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold-deep)}
  .shop-ic{font-size:22px;height:24px;display:flex;align-items:center}
  .shop-name{font-size:11px;line-height:1.2;min-height:26px;display:flex;align-items:center}
  .shop-item .btn{width:100%;justify-content:center;display:flex;padding:6px;font-size:10px}
  .swatch{display:inline-block;width:20px;height:20px;border:2px solid var(--border)}

  /* ======= HUD fixe + aura d'avatar ======= */
  .hud{position:fixed;top:0;left:0;right:0;margin:0 auto;
    width:100%;max-width:460px;z-index:35;border-top-width:0;
    padding-top:calc(12px + env(safe-area-inset-top,0px));
    box-shadow:
      inset 0 -2px 0 var(--bevel-lo), inset 0 1px 0 var(--bevel-hi),
      0 3px 0 rgba(58,42,18,.30), 0 10px 22px rgba(40,26,10,.38)}
  #avatar{position:relative;z-index:1}
  .streak-badge{z-index:2}
  .avatar-aura{position:absolute;top:50%;left:50%;width:42px;height:42px;
    transform:translate(-50%,-50%);border-radius:50%;pointer-events:none;opacity:0;
    filter:blur(9px) brightness(1.2);z-index:0;
    background:radial-gradient(circle, #fff64a 0%, var(--aura-c1,#ffcf00) 26%, var(--aura-c2,#ff7c10) 56%, #dd2410 84%, transparent 96%);
    animation:auraPulse 2.4s ease-in-out infinite;transition:opacity .6s,width .6s,height .6s}
  @keyframes auraPulse{0%,100%{transform:translate(-50%,-50%) scale(.9)}50%{transform:translate(-50%,-50%) scale(1.06)}}

  /* ======= HUD : médaille objectifs ======= */
  .hud-right{display:flex;align-items:center;gap:8px}
  /* Icône-porte (barre d'onglets) : retour au campement */
  .door-ico{display:block;width:16px;height:20px;position:relative;
    background:linear-gradient(#8a6a3c,#6a4a2c 70%,#5a3a22);border:2px solid #3a2415;
    border-radius:8px 8px 2px 2px;box-shadow:inset 0 1px 0 rgba(255,235,180,.25)}
  .door-ico::before{content:"";position:absolute;inset:1px 1px 0;border-radius:6px 6px 0 0;
    background:repeating-linear-gradient(90deg,transparent 0 3px,rgba(58,36,21,.45) 3px 4px)}
  .door-ico::after{content:"";position:absolute;right:2px;top:55%;width:3px;height:3px;border-radius:50%;
    background:#ffd24d;box-shadow:0 0 3px 1px rgba(176,125,20,.8)}
  .medal-btn{position:relative;background:var(--inset);border:2px solid var(--plum);color:var(--plum);
    font-size:15px;width:34px;height:30px;display:grid;place-items:center;cursor:pointer;
    box-shadow:2px 2px 0 var(--shadow);line-height:1}
  .medal-btn:active{transform:translate(1px,1px);box-shadow:1px 1px 0 var(--shadow)}
  .medal-btn.on{border-color:var(--gold);color:var(--gold);box-shadow:2px 2px 0 var(--shadow),0 0 8px rgba(255,208,86,.4)}
  .medal-badge{position:absolute;top:-7px;right:-7px;background:var(--red);color:#fff;font-size:8px;font-weight:700;
    min-width:15px;height:15px;display:grid;place-items:center;border:1px solid var(--shadow);line-height:1;font-family:var(--mono)}
  .medal-badge:empty{display:none}

  /* Zone de contenu : s'adapte au contenu, sans cadre (le swipe est global) */
  .content{min-height:40px;padding-bottom:calc(130px + env(safe-area-inset-bottom,0px))}

  /* ======= HUD : pièces tactiles ======= */
  .fish-chip{font-family:var(--mono);font-weight:700;font-size:12px;color:var(--ink);
    background:var(--inset);border:2px solid var(--border);padding:4px 8px;border-radius:3px;
    display:inline-flex;align-items:center;margin-right:5px}
  .coins-btn{display:inline-flex;align-items:center;gap:5px;background:var(--inset);
    border:2px solid var(--gold-deep);color:var(--gold);font-family:var(--mono);font-weight:700;
    font-size:11px;padding:3px 8px;cursor:pointer;box-shadow:2px 2px 0 var(--shadow)}
  .coins-btn:active{transform:translate(1px,1px);box-shadow:1px 1px 0 var(--shadow)}
  .coins-cta{font-size:13px;line-height:1}

  /* ======= Dock : navigation basse + FAB ======= */
  .app{padding-top:calc(108px + env(safe-area-inset-top,0px))}
  .dock{position:fixed;left:0;right:0;bottom:0;pointer-events:none;z-index:30}
  .botnav{pointer-events:auto;width:100%;max-width:460px;margin:0 auto;
    display:grid;grid-template-columns:repeat(4,1fr);
    background:
      var(--noise),
      linear-gradient(180deg, var(--panel-hi), var(--panel) 55%),
      var(--panel);
    border-top:3px solid var(--border-hi);
    box-shadow:inset 0 1px 0 var(--bevel-hi), 0 -3px 0 rgba(58,42,18,.18), 0 -8px 20px rgba(40,26,10,.34)}
  .botnav.solo{grid-template-columns:1fr}
  .navitem{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:3px;height:calc(56px + env(safe-area-inset-bottom,0px));padding:0 2px;
    padding-bottom:calc(env(safe-area-inset-bottom,0px) * .55);cursor:pointer;background:none;border:none;
    color:var(--ink-dim);font-family:var(--mono);font-weight:700;font-size:9.5px;letter-spacing:0;
    text-transform:uppercase;transition:.08s}
  .navitem .ic{font-size:21px;line-height:1;display:flex;align-items:center;justify-content:center;height:22px}
  .navitem.on{color:var(--gold)}
  .navitem.on .ic{filter:drop-shadow(0 0 5px var(--gold-deep))}
  .navitem.on::before{content:"";position:absolute;top:0;left:22%;right:22%;height:3px;background:var(--gold)}
  .navitem .badge-n{position:absolute;top:-1px;right:calc(50% - 22px);background:var(--red);color:#fff;
    font-size:8px;font-weight:700;min-width:15px;height:15px;display:grid;place-items:center;
    border:1px solid var(--shadow);line-height:1}
  .navitem .badge-n:empty{display:none}
  .fab{pointer-events:auto;position:absolute;right:16px;bottom:calc(72px + env(safe-area-inset-bottom,0px));width:56px;height:56px;
    font-size:26px;color:#3a2600;border:3px solid var(--gold);
    background:radial-gradient(circle at 32% 28%, rgba(255,240,190,.85) 0%, rgba(255,240,190,0) 46%), var(--gold-deep);
    box-shadow:3px 3px 0 var(--shadow), 0 8px 16px rgba(40,26,10,.35), inset 0 -3px 0 rgba(0,0,0,.22);
    cursor:pointer;font-family:var(--mono);font-weight:700;
    display:grid;place-items:center;transition:.06s;text-shadow:0 1px 0 rgba(255,240,190,.5)}
  .fab:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 var(--shadow)}
  .fab:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--shadow)}
  .fab.hidden{display:none}

  /* ======= Bande semaine (Principales / Secondaires) ======= */
  .week-strip{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:10px}
  .wd-pill{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
    min-height:46px;padding:5px 0;cursor:pointer;background:var(--bg2);border:2px solid var(--border);
    color:var(--ink-dim);font-family:var(--mono);font-weight:700;line-height:1}
  .wd-pill .d{font-size:9px}
  .wd-pill .n{font-size:14px;font-variant-numeric:tabular-nums}
  .wd-pill .dot{width:4px;height:4px;background:var(--blue)}
  .wd-pill.today{border-color:var(--gold-deep);color:var(--ink)}
  .wd-pill.sel{background:var(--gold-deep);border-color:var(--gold);color:#3a2600}
  .wd-pill.sel .dot{background:#3a2600}

  /* ======= Contrôle segmenté (formulaire) ======= */
  .seg{display:flex;gap:4px}
  .seg button{flex:1;min-height:40px;padding:6px 3px;cursor:pointer;background:var(--bg2);
    border:2px solid var(--border);color:var(--ink-dim);font-family:var(--mono);font-weight:700;
    font-size:9.5px;text-transform:uppercase;letter-spacing:.3px;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:3px;line-height:1.1;text-align:center}
  .seg button .si{font-size:16px}
  .seg button.on{background:var(--panel-hi);border-color:var(--gold);color:var(--gold)}

  /* ======= Finitions ======= */
  .btn{min-height:40px}
  :focus-visible{outline:2px solid var(--gold);outline-offset:2px}

  /* ======= Bannière victoire (journée accomplie) ======= */
  .victory{position:relative;overflow:hidden;text-align:center;padding:30px 16px;
    border:3px solid var(--border-hi);background:#f2e4b6;box-shadow:inset 0 0 0 2px var(--gold-deep)}
  .victory-rays{position:absolute;inset:-60%;z-index:0;
    background:conic-gradient(from 0deg, transparent 0 14deg, rgba(140,90,20,.12) 14deg 28deg);
    animation:spin 16s linear infinite}
  .victory-ic{position:relative;z-index:1;font-size:54px;line-height:1;
    filter:drop-shadow(0 0 12px var(--gold-deep));animation:vbob 2.2s ease-in-out infinite}
  .victory-t{position:relative;z-index:1;font-family:var(--mono);font-weight:700;text-transform:uppercase;
    letter-spacing:1px;color:var(--gold);font-size:16px;margin-top:10px}
  .victory-s{position:relative;z-index:1;color:var(--ink-dim);font-size:12px;margin-top:6px;
    max-width:260px;margin-left:auto;margin-right:auto;line-height:1.4}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes vbob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  #quests{animation:tabIn .22s ease}
  @keyframes tabIn{from{opacity:.35;transform:translateY(4px)}to{opacity:1;transform:none}}

  /* ======= Écran d'accueil : le campement-HUB (plein écran) ======= */
  .launch{position:fixed;inset:0;z-index:80;display:none;background:#0c0a16}
  #camp{position:absolute;inset:0;width:100%;height:100%;object-fit:fill;image-rendering:pixelated;z-index:0}
  .hub-spot{position:absolute;z-index:3;background:none;border:none;cursor:pointer;padding:0}
  .hub-spot{-webkit-tap-highlight-color:transparent;touch-action:manipulation}
  .hub-pip{position:absolute;z-index:4;transform:translate(-50%,-50%);pointer-events:none;
    background:#c53a2a;color:#fff;font-family:var(--mono);font-size:10px;font-weight:700;
    min-width:17px;height:17px;display:grid;place-items:center;border-radius:3px;
    border:1.5px solid #5e1610;box-shadow:0 2px 3px rgba(0,0,0,.5)}
  .hub-gear{position:absolute;z-index:2;transform:translateX(-50%);pointer-events:none;
    font-size:12px;filter:drop-shadow(0 2px 2px rgba(0,0,0,.7));opacity:.9}

  /* ======= Le Panneau de la Taverne (quêtes du jour) ======= */
  .tavern{position:fixed;inset:0;z-index:83;display:none;overflow-y:auto;
    background:
      radial-gradient(120% 60% at 50% -10%, rgba(232,169,46,.08), transparent 55%),
      repeating-linear-gradient(90deg,#33200f 0 40px,#2c1b0c 40px 42px,#3a2415 42px 82px,#301d0e 82px 84px),
      #33200f}
  .tv-inner{max-width:420px;margin:0 auto;padding:calc(16px + env(safe-area-inset-top,0px)) 16px calc(26px + env(safe-area-inset-bottom,0px))}
  .tv-sign{width:82%;margin:4px auto 0;text-align:center;position:relative;
    background:linear-gradient(#6a4a2c,#5a3a22);border:2px solid #2a180c;border-radius:4px;
    padding:9px 6px 8px;color:#f0ddac;font-family:var(--mono);font-weight:700;letter-spacing:2px;font-size:14px;
    box-shadow:0 4px 8px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,235,180,.18)}
  .tv-sign small{display:block;font-weight:400;letter-spacing:1px;font-size:10px;color:#c8ab72;margin-top:3px;text-transform:capitalize}
  .tv-sign::before,.tv-sign::after{content:"";position:absolute;top:-12px;width:2px;height:12px;background:#8a7448}
  .tv-sign::before{left:18%}.tv-sign::after{right:18%}
  .tv-chips{display:flex;justify-content:center;gap:7px;margin:16px 0 6px;flex-wrap:wrap}
  .tv-chip{background:#ecdcae;color:#5a4014;border:1.5px solid #8a6a3c;font-family:var(--mono);
    font-size:11px;font-weight:700;padding:4px 9px;transform:rotate(-.8deg);box-shadow:0 2px 3px rgba(0,0,0,.4)}
  .tv-chip:nth-child(2){transform:rotate(.9deg)}
  .tv-chip:nth-child(3){transform:rotate(-.4deg)}
  .tv-notes{display:flex;flex-direction:column;gap:11px;margin-top:12px}
  /* pagination horizontale du panneau : une page = ce qui tient à l'écran */
  .tv-pages{display:flex;overflow-x:auto;overflow-y:hidden;scroll-snap-type:x mandatory;
    -webkit-overflow-scrolling:touch;scrollbar-width:none;-ms-overflow-style:none;
    margin-top:12px;overscroll-behavior-x:contain}
  .tv-pages::-webkit-scrollbar{display:none}
  .tv-page{flex:0 0 100%;width:100%;box-sizing:border-box;scroll-snap-align:center;
    display:flex;flex-direction:column;gap:11px;align-content:flex-start;padding:8px 8px 0;
    user-select:none;-webkit-user-select:none}
  .tv-pager{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:12px;
    color:#c8ab72;font-family:var(--mono);font-size:10.5px;letter-spacing:1px}
  .tv-dots{display:flex;gap:6px}
  .tv-dot{width:9px;height:9px;padding:0;border-radius:50%;background:#6a4a2c;
    border:1px solid #2a180c;cursor:pointer}
  .tv-dot.on{background:#e8b64a}
  .tv-hint{color:#8a6a3c}
  .tv-note{position:relative;background:linear-gradient(172deg,#f5e9c6,#e6d3a0 90%);
    color:#3a2a12;border:1px solid #b79a5e;padding:11px 12px 10px 13px;cursor:pointer;
    box-shadow:0 3px 6px rgba(0,0,0,.42);font-family:var(--mono)}
  .tv-note::before{content:"";position:absolute;top:-4px;left:50%;width:8px;height:8px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #e86a5a, #8a2318 70%);box-shadow:0 2px 3px rgba(0,0,0,.5)}
  .tv-note.r1{transform:rotate(-1.2deg)}
  .tv-note.r2{transform:rotate(.8deg)}
  .tv-note.r3{transform:rotate(-.5deg)}
  .tv-note .t{font-weight:700;font-size:13px}
  .tv-note .meta{margin-top:5px;font-size:10.5px;color:#7c5e34}
  .tv-note .meta b{color:#8a6010}
  .tv-note.done{filter:saturate(.55) brightness(.93)}
  .tv-note.done .t{text-decoration:line-through;text-decoration-color:#a8362a;text-decoration-thickness:2px;color:#6a5638}
  .tv-note .wax{position:absolute;right:9px;top:50%;transform:translateY(-50%) rotate(-12deg);
    width:32px;height:32px;border-radius:50%;
    background:radial-gradient(circle at 38% 32%, #c85a4a, #8a2318 62%, #6a1a10);
    color:#f5d9a0;display:grid;place-items:center;font-size:15px;font-weight:700;
    box-shadow:0 2px 4px rgba(0,0,0,.45)}
  .tv-note .wax.sm{width:24px;height:24px;font-size:12px;right:6px}
  .tv-note.evt{border-left:5px solid #3f6f96}
  .tv-note .badge{position:absolute;right:-6px;top:-6px;background:#3f6f96;color:#e8f1f8;
    font-size:9px;font-weight:700;padding:2px 6px;transform:rotate(3deg);box-shadow:0 2px 3px rgba(0,0,0,.4)}
  .tv-side{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .tv-side .tv-note .t{font-size:11.5px}
  .tv-hall{font-family:var(--mono);font-size:10px;color:#c8ab72;text-align:center;line-height:1.5;margin-top:2px}
  .tv-empty{background:rgba(236,220,174,.12);border:1.5px dashed #8a6a3c;color:#c8ab72;
    font-family:var(--mono);font-size:11px;text-align:center;padding:16px 10px}
  .tv-foot{margin-top:14px;text-align:center;color:#c8ab72;font-family:var(--mono);font-size:10.5px}
  .tv-actions{display:flex;gap:9px;margin-top:16px}
  .tv-btn{flex:1;min-height:44px;background:var(--gold-deep);border:2px solid var(--gold);color:#3a2600;
    font-family:var(--mono);font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:1px;
    cursor:pointer;box-shadow:0 3px 0 rgba(0,0,0,.4)}
  .tv-btn.back{flex:0 0 32%;background:#54341e;border-color:#8a6a3c;color:#f0ddac}
  .tv-btn:active{transform:translateY(2px);box-shadow:0 1px 0 rgba(0,0,0,.4)}

  /* ======= Le Nid : œufs + collection de créatures ======= */
  .nest{position:fixed;inset:0;z-index:83;display:none;overflow-y:auto;
    background:
      radial-gradient(120% 55% at 50% -6%, rgba(232,169,46,.10), transparent 55%),
      linear-gradient(#2a1c10,#20140a)}
  .ns-inner{max-width:440px;margin:0 auto;padding:calc(16px + env(safe-area-inset-top,0px)) 15px calc(26px + env(safe-area-inset-bottom,0px))}
  .ns-sign{width:78%;margin:2px auto 0;text-align:center;position:relative;
    background:linear-gradient(#6a4a2c,#5a3a22);border:2px solid #2a180c;border-radius:4px;
    padding:9px 6px 8px;color:#f0ddac;font-family:var(--mono);font-weight:700;letter-spacing:2px;font-size:14px;
    box-shadow:0 4px 8px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,235,180,.18)}
  .ns-sign small{display:block;font-weight:400;letter-spacing:1px;font-size:10px;color:#c8ab72;margin-top:3px}
  .ns-egg{margin:16px auto 4px;max-width:340px;background:linear-gradient(#3a2716,#2e1e10);
    border:2px solid #6a4a2c;box-shadow:0 4px 0 rgba(0,0,0,.4);padding:14px;display:flex;align-items:center;gap:14px}

function load(){
  try{
    const raw=localStorage.getItem(KEY);
    if(!raw)return seed();
    const s=JSON.parse(raw);
    if(s.coins==null)s.coins=0;
    if(!s.rewards)s.rewards=seed().rewards;
    if(!s.cosmetics)s.cosmetics=defaultCosmetics();
    if(!s.camp)s.camp={fire:true};
    if(s.camp.fire==null)s.camp.fire=true;
    /* migration Idle : les anciens "modèles" possédés deviennent des créatures du Nid */
    if(!s.creatures){
      const owned=(s.cosmetics.owned||[]).filter(k=>k.startsWith("model:")).map(k=>k.slice(6))
        .filter(id=>CREATURES[id]);
      if(!owned.includes("heros"))owned.unshift("heros");
      const counts={}; owned.forEach(id=>counts[id]=1);
      s.creatures={owned,counts};
      if(!CREATURES[s.cosmetics.model])s.cosmetics.model="heros";
    }
    if(!s.tasks)s.tasks={};
    if(!s.res)s.res={fish:0,grilled:0};
    if(!s.chest)s.chest={coins:0,fish:0,grilled:0};
    if(!s.cosmetics.aura){s.cosmetics.aura="braise";
      s.cosmetics.owned=s.cosmetics.owned||[];
      if(!s.cosmetics.owned.includes("aura:braise"))s.cosmetics.owned.push("aura:braise");}
    if(!s.achievements)s.achievements=defaultAchievements();
    if(!s.settings)s.settings={theme:"light",sound:true,anim:true,splash:true};
    ["sound","anim","splash"].forEach(k=>{if(s.settings[k]==null)s.settings[k]=true;});
    if(!s.settings.theme)s.settings.theme="light";
    if(!s.history)s.history={};
    if(s.totalDone==null)s.totalDone=(s.done||[]).length+Object.values(s.history||{}).reduce((a,h)=>a+((h.done||[]).length),0);
    // migration : événements (heure/rappel) + routines (jours/heure)
    s.quests.forEach(x=>{
      if(x.type==="evenement"){
        if(x.time==null)x.time="";
        if(x.reminder==null)x.reminder=0;
        if(x.notified==null)x.notified=false;
        if(x.remFired==null)x.remFired=false;
      }else{
        if(x.days==null)x.days=[0,1,2,3,4,5,6];
        if(x.time==null)x.time="";
        if(x.dur==null)x.dur=0;
        if(x.notifDay==null)x.notifDay=false;
        if(x.abandonedToday==null)x.abandonedToday=false;
        if(x.rec==="quotidienne"||x.rec==="hebdomadaire")x.rec="tous";
        if(String(x.rec).startsWith("spont"))x.rec="oneshot";
      }
    });
    // migration : ancienne liste "abandoned" -> drapeaux sur les quêtes
    if(Array.isArray(s.abandoned)&&s.abandoned.length){
      s.abandoned.forEach(a=>{ if(a&&a.id&&!s.quests.some(q=>q.id===a.id)){ a.abandonedToday=true; a.doneToday=false; s.quests.push(a); } });
    }
    s.abandoned=[];
    // Reset quotidien + archivage
    if(s.lastDay!==today()){
      const doneDay=(s.done||[]).slice();
      const abDay=s.quests.filter(x=>x.abandonedToday).map(x=>({title:x.title,icon:x.icon}));
      if(doneDay.length||abDay.length) s.history[s.lastDay]={done:doneDay,abandoned:abDay};
      const ym=today().slice(0,7);
      Object.keys(s.history).forEach(k=>{ if(k.slice(0,7)!==ym) delete s.history[k]; });
      s.done=[];
      s.quests.forEach(x=>{
        if((x.type==="principale"||x.type==="secondaire")&&x.rec!=="oneshot")x.doneToday=false;
        x.abandonedToday=false; x.notifDay=false;
      });
      s.lastDay=today();
    }
    return s;
  }catch(e){return seed()}
}

function xpForLevel(l){return 120+(l-1)*45}          // coût du niveau l
function levelInfo(total){
  let l=1,rem=total;
  while(rem>=xpForLevel(l)){rem-=xpForLevel(l);l++;}
  return{level:l,cur:rem,next:xpForLevel(l)};
}
function multiplier(){return 1+Math.min(S.streak,10)*0.1} // jusqu'à x2

  const li=levelInfo(S.xpTotal);

  document.getElementById("coins").textContent=S.coins;

  document.getElementById("xpfill").style.width=(100*li.cur/li.next)+"%";

    aura.style.opacity = S.streak>0 ? Math.min(1,(0.97+0.4*s)).toFixed(2) : 0;
    const size=(34+s*8).toFixed(0); aura.style.width=size+"px"; aura.style.height=size+"px";
    const au=AURAS[S.cosmetics.aura]||AURAS.braise;

    aura.style.animationDuration=(2.6-1.3*s).toFixed(2)+"s";

}

/* ================= Talents & tâches des créatures =================
   Chaque créature a un talent (cuisine / pêche / exploration). Sa stat de talent =
   niveau de base lié à la rareté (1 à 5) + 1 par doublon obtenu. Plus le niveau est
   haut, plus la tâche est courte. Une créature envoyée en tâche s'anime dans le camp. */
const TALENTS={cuisine:{name:"Cuisine",ic:"🍲"},peche:{name:"Pêche",ic:"🎣"},exploration:{name:"Exploration",ic:"🧭"}};
/* Économie : la pêche ramène des poissons crus, la cuisine les transforme en poissons
   grillés, et les grillés nourrissent les explorations. Explo de base = 10 min ;
   chaque 🍢 donné ajoute 10 min. L'or récolté = minutes × rendement, et le rendement
   dépend de la stat d'exploration. Les réserves sont plafonnées : il faut gérer. */
const TASK_BASE={
  cuisine:    {perFish:15*60},                   // niv. 1 : 1 🍢 toutes les 15 min, plus vite ensuite
  peche:      {stepMin:15, maxMin:120},          // on choisit la DURÉE (15 à 120 min)
  exploration:{base:10*60, perFish:10*60}        // 10 min + 10 min par 🍢 embarqué
};
const FISH_CAP=20, GRILL_CAP=10;
const MAX_TAL={peche:2, cuisine:1, exploration:2};   // un seul cuisinier à la fois
/* niveaux de base : les épiques (8) et légendaires (12) sont bien plus durs à obtenir */
function talentLvl(id){const cr=CREATURES[id];if(!cr)return 1;
  return [1,2,3,8,12][RARITY_ORDER.indexOf(cr.rar)]+Math.max(0,(S.creatures.counts[id]||1)-1);}
/* Pêche : on choisit la durée, le NIVEAU dope le rendement (poissons ramenés).
   Cuisine : le niveau accélère le gril. Exploration : le niveau dope l'or par minute. */
/* rendement : 1 🐟 par 15 min de base, +1 tous les 2 niveaux (nv2=2, nv4=3, nv6=4…) */
function fishYield(id,min){return Math.max(1,Math.round(min/15*(1+Math.floor(talentLvl(id)/2))));}
function cookPer(id){return Math.round(TASK_BASE.cuisine.perFish*Math.max(.4,1-0.07*(talentLvl(id)-1)));}
function taskDur(id,fish){
  const b=TASK_BASE.exploration;
  return b.base+b.perFish*(fish||0);
}
function explGain(id,fish){
  const min=taskDur(id,fish)/60;
  return Math.round(min*(0.5+0.25*talentLvl(id)));
}
function startTask(id,param){
  S.tasks=S.tasks||{};S.res=S.res||{fish:0,grilled:0};
  if(S.tasks[id])return;
  const tal=CREATURES[id].tal, tk={start:Date.now(),tal};
  const pris=Object.values(S.tasks).filter(k=>k.tal===tal);
  if(pris.length>=MAX_TAL[tal]){
    toast(MAX_TAL[tal]===1?"Il y a déjà un cuisinier au feu !"
      :`Déjà ${MAX_TAL[tal]} créatures en ${TALENTS[tal].name.toLowerCase()} !`);return;
  }
  tk.slot=pris.some(k=>(k.slot||0)===0)?1:0;   // poste attitré : gauche (0) puis droite (1)
  if(tal==="peche"){
    const min=Math.max(TASK_BASE.peche.stepMin,Math.min(TASK_BASE.peche.maxMin,param||TASK_BASE.peche.stepMin));
    tk.dur=min*60;
    tk.yield=fishYield(id,min);
  }else if(tal==="cuisine"){
    if(S.res.fish<1){toast("Aucun poisson à griller — envoie d'abord un pêcheur ! 🐟");return;}
    tk.done=0;                                   // 🍢 déjà grillés (versés au coffre au fil de l'eau)
    tk.last=Date.now()+9000;                     // le gril démarre après le trajet
    setTimeout(ensureCookFire,9500);             // s'il arrive devant un feu froid, il le rallume
  }else{
    tk.fish=Math.max(0,Math.min(param||0,S.res.grilled));  // autant de 🍢 qu'on en possède
    S.res.grilled-=tk.fish;                      // provisions consommées au départ
    tk.dur=taskDur(id,tk.fish);
    tk.gain=explGain(id,tk.fish);
  }
  S.tasks[id]=tk;save();
  toast(`${TALENTS[tal].ic} ${CREATURES[id].name} `+(
    tal==="peche"?`part pêcher ${Math.round(tk.dur/60)} min (≈${tk.yield} 🐟) !`
    :tal==="cuisine"?`s'installe au gril — tant qu'il y a du poisson, ça grille !`
    :`part en exploration${tk.fish?` avec ${tk.fish} 🍢 (${Math.round(tk.dur/60)} min)`:""} !`));
}
/* Arrêter le cuisinier (bouton du Nid) — ou fin naturelle quand il n'y a plus de poisson. */
function stopCooking(id,auto){
  const tk=S.tasks&&S.tasks[id];if(!tk||tk.tal!=="cuisine")return;
  delete S.tasks[id];
  HUB_DROPS.push({id,tal:"cuisine",slot:tk.slot||0,t0:Date.now()});
  toast(auto?`🍲 ${CREATURES[id].name} a tout grillé (${tk.done||0} 🍢) !`
            :`🍲 ${CREATURES[id].name} range son gril (${tk.done||0} 🍢 au coffre)`);
  save();campStaticKey="";
  const n=document.getElementById("nest");
  if(n&&n.style.display==="block")openNest();
}
/* À la fin d'une tâche, la créature va déposer son butin dans le COFFRE près de la
   tente (animation courte), et le coffre s'entrouvre. Le joueur clique dessus pour
   tout récupérer — c'est là que les plafonds de réserve s'appliquent. */
let HUB_DROPS=[];
function checkTasks(){
  if(!S.tasks)return;
  S.chest=S.chest||{coins:0,fish:0,grilled:0};S.res=S.res||{fish:0,grilled:0};
  let changed=false;
  Object.keys(S.tasks).forEach(id=>{
    const tk=S.tasks[id];
    /* auto-réparation : une tâche d'un ancien format (durée manquante, talent inconnu…)
       resterait coincée À VIE et bloquerait la balade de la créature — on la libère. */
    if(!tk||!TALENTS[tk.tal]||!CREATURES[id]||(tk.tal!=="cuisine"&&!isFinite(tk.dur))){
      delete S.tasks[id];changed=true;
      if(CREATURES[id])toast(`${CREATURES[id].name} rentre au camp (mission expirée)`);
      return;
    }
    if(tk.tal==="cuisine"){
      /* gril CONTINU : consomme la réserve de 🐟, verse les 🍢 au coffre au fil de l'eau */
      if(!S.camp.fire){tk.last=Math.max(tk.last||Date.now(),Date.now());ensureCookFire();return;}  // feu éteint : pause + rallumage
      const per=cookPer(id)*1000;
      let n=Math.floor((Date.now()-(tk.last||tk.start))/per);
      if(n>0){
        const can=Math.min(n,S.res.fish);
        if(can>0){
          S.res.fish-=can;S.chest.grilled+=can;
          tk.done=(tk.done||0)+can;tk.last=(tk.last||tk.start)+can*per;
          changed=true;campStaticKey="";
        }
        if(S.res.fish<=0){changed=true;stopCooking(id,true);}
        else if(can<n)tk.last=Date.now();
      }
      return;
    }
    if(Date.now()-tk.start>=tk.dur*1000){
      changed=true;delete S.tasks[id];
      if(tk.tal==="peche"){
        const n=tk.yield!=null?tk.yield:3;
        S.chest.fish+=n;
        toast(`🎣 ${CREATURES[id].name} dépose ${n} 🐟 dans le coffre`);
      }else{
        const g=tk.gain!=null?tk.gain:35;S.chest.coins+=g;
        toast(`🧭 ${CREATURES[id].name} dépose ${g} 🪙 dans le coffre`);
      }
      HUB_DROPS.push({id,tal:tk.tal,slot:tk.slot||0,t0:Date.now()}); // repart de SON poste
    }});
  if(changed){save();renderHUD();
    const n=document.getElementById("nest");
    if(n&&n.style.display==="block"&&!document.getElementById("nsExpl")
       &&Date.now()-(window.nestTouchT||0)>1200)openNest();
    campStaticKey="";}
}
function collectChest(){
  S.chest=S.chest||{coins:0,fish:0,grilled:0};S.res=S.res||{fish:0,grilled:0};
  const ch=S.chest, got=[];
  if(ch.coins>0){S.coins+=ch.coins;got.push(`+${ch.coins} 🪙`);ch.coins=0;}
  const f=Math.min(ch.fish,FISH_CAP-S.res.fish);
  if(f>0){S.res.fish+=f;ch.fish-=f;got.push(`+${f} 🐟`);}
  const g=Math.min(ch.grilled,GRILL_CAP-S.res.grilled);
  if(g>0){S.res.grilled+=g;ch.grilled-=g;got.push(`+${g} 🍢`);}
  if(!got.length){
    toast((ch.fish>0||ch.grilled>0)?"Réserves pleines — utilise des poissons d'abord !":"Le coffre est vide.");
    return;
  }
  save();renderHUD();campStaticKey="";if(launchOpen)drawHub(0);
  try{sfxMagic();}catch(e){}
  showLoot(got,(ch.fish>0||ch.grilled>0));
}
/* Petit cadre de butin : ce que le coffre vient de donner, ligne par ligne */
function showLoot(got,reste){
  document.getElementById("lootOv")?.remove();
  const ov=document.createElement("div");ov.id="lootOv";ov.className="loot-ov";
  ov.innerHTML=`<div class="loot-box">
    <div class="loot-ttl">✦ BUTIN ✦</div>
    <div class="loot-items">${got.map((g,i)=>{
      const m=g.match(/^\+(\d+)\s(.+)$/);
      return `<div class="loot-it" style="animation-delay:${.08+i*.14}s">
        <span class="ic">${m?m[2]:g}</span><b>+${m?m[1]:""}</b></div>`;}).join("")}</div>
    ${reste?'<div class="loot-note">Réserves pleines : le reste attend dans le coffre</div>':""}
    <button class="loot-ok">Merveilleux !</button></div>`;
  document.body.appendChild(ov);
  const close=()=>ov.remove();
  ov.querySelector(".loot-ok").onclick=close;
  ov.onclick=e=>{if(e.target===ov)close();};
}

/* ---- Créatures animées par GIF (créations de l'utilisateur, frames pré-extraites) ---- */
const GIFRT={};
function gifData(id){return (typeof GIFSPRITES!=="undefined")?GIFSPRITES[id]:null;}
function gifRT(id){
  let r=GIFRT[id];
  if(!r){const g=gifData(id);if(!g)return null;
    r=GIFRT[id]={imgs:g.frames.map(s=>{const im=new Image();im.src=s;return im;}),
      idx:0,acc:0,last:0,boostUntil:0};}
  return r;
}

   permet de caler toutes les créatures à la même taille et les pattes au sol, quel que soit
   le cadrage choisi dans l'éditeur. */
const GIF_FILL=0.667;   // hauteur du dessin = 2/3 de la case, comme les créatures dessinées
const GIF_BASE=0.722;   // ligne de sol : identique à celle des créatures dessinées (13/18 de la case)
function gifBBox(id){
  const r=gifRT(id),g=gifData(id); if(!r||!g)return null;
  if(r.bbox)return r.bbox;
  if(!r.imgs.every(im=>im.complete&&im.naturalWidth))return null;
  const c=document.createElement("canvas");c.width=g.w;c.height=g.h;
  const cx=c.getContext("2d");
  let x0=g.w,y0=g.h,x1=-1,y1=-1;
  r.imgs.forEach(im=>{cx.clearRect(0,0,g.w,g.h);cx.drawImage(im,0,0);
    const d=cx.getImageData(0,0,g.w,g.h).data;
    for(let y=0;y<g.h;y++)for(let x=0;x<g.w;x++)
      if(d[(y*g.w+x)*4+3]>30){if(x<x0)x0=x;if(x>x1)x1=x;if(y<y0)y0=y;if(y>y1)y1=y;}});
  if(x1<0)return null;
  return r.bbox={x0,y0,x1,y1,w:x1-x0+1,h:y1-y0+1};
}
/* Emprise d'UNE frame précise (mesurée + cachée) : sert à poser une créature qui
   s'écrase/rebondit sur place (le blob) toujours par son propre bas, quelle que soit
   la frame — sinon l'emprise-union la fait flotter au-dessus de son ombre. */
function gifFrameBBox(id,fi){
  const r=gifRT(id),g=gifData(id); if(!r||!g)return null;
  r.fbb=r.fbb||{};
  if(r.fbb[fi])return r.fbb[fi];
  const im=r.imgs[fi]; if(!im||!im.complete||!im.naturalWidth)return null;
  const c=document.createElement("canvas");c.width=g.w;c.height=g.h;
  const cx=c.getContext("2d");cx.drawImage(im,0,0);
  const d=cx.getImageData(0,0,g.w,g.h).data;
  let x0=g.w,y0=g.h,x1=-1,y1=-1;
  for(let y=0;y<g.h;y++)for(let x=0;x<g.w;x++)
    if(d[(y*g.w+x)*4+3]>30){if(x<x0)x0=x;if(x>x1)x1=x;if(y<y0)y0=y;if(y>y1)y1=y;}
  if(x1<0)return null;
  return r.fbb[fi]={x0,y0,x1,y1,w:x1-x0+1,h:y1-y0+1};
}
function gifStill(id){        // 1re image, sans faire avancer l'animation (catalogue figé)
  const r=gifRT(id); if(!r)return null;
  const im=r.imgs[0];
  return (im&&im.complete&&im.naturalWidth)?im:null;
}
function gifFrame(id,moving){
  const g=gifData(id),r=gifRT(id);if(!g||!r)return null;
  /* certaines créatures (capybara) ont deux régimes : immobiles, elles bouclent sur
     leurs `idleFrames` premières images ; en déplacement, l'animation complète joue. */
  const cr=CREATURES[id]||{};
  const nIdle=(!moving&&cr.idleFrames)?cr.idleFrames:0;
  /* en déplacement, `walkFrames` boucle sur les N DERNIÈRES images (cycle de marche) */
  const wLen=(moving&&cr.walkFrames)?cr.walkFrames:0;
  const wS=wLen?g.frames.length-wLen:0;
  const now=performance.now();
  if(!r.last)r.last=now;
  const speed=now<r.boostUntil?3:1;      // clic sur la créature : ×3 pendant 2 s
  r.acc+=(now-r.last)*speed;r.last=now;
  let guard=0;
  while(r.acc>=g.delays[r.idx]&&guard++<64){r.acc-=g.delays[r.idx];
    r.idx=nIdle?(r.idx+1)%nIdle
         :wLen?wS+((((r.idx-wS)+1)%wLen+wLen)%wLen)
         :(r.idx+1)%g.frames.length;}
  const im=r.imgs[r.idx];
  return (im&&im.complete&&im.naturalWidth)?im:null;
}
/* Frame courante SANS faire avancer l'animation : pour les affichages secondaires
   (avatar du HUD quand le camp anime déjà la créature) — un seul animateur à la fois. */
function gifPeek(id){
  const r=gifRT(id);if(!r)return null;
  const im=r.imgs[r.idx];
  return (im&&im.complete&&im.naturalWidth)?im:null;
}
/* Mise à l'échelle fractionnaire SANS déformation : le facteur non entier est appliqué en
   deux temps (agrandissement entier net ×4, puis réduction lissée vers la taille finale),
   et le résultat est mis en cache par frame. Chaque frame subit exactement la même
   transformation : les formes du dessin restent stables d'une image à l'autre. */
function gifScaledFrame(id,im,dw,dh){
  const r=gifRT(id); if(!r)return im;
  if(!r.zcache)r.zcache=new Map();
  if(r.zcache.size>400)r.zcache.clear();       // garde-fou mémoire
  const key=dw+"x"+dh+"#"+r.imgs.indexOf(im);
  let cv=r.zcache.get(key);
  if(!cv){
    const g=gifData(id), up=4;
    const tmp=document.createElement("canvas");tmp.width=g.w*up;tmp.height=g.h*up;
    const tx=tmp.getContext("2d");tx.imageSmoothingEnabled=false;
    tx.drawImage(im,0,0,g.w*up,g.h*up);
    cv=document.createElement("canvas");cv.width=dw;cv.height=dh;
    const c2=cv.getContext("2d");c2.imageSmoothingEnabled=true;c2.imageSmoothingQuality="high";
    c2.drawImage(tmp,0,0,dw,dh);
    r.zcache.set(key,cv);
  }
  return cv;
}
/* Dessine une créature dans un contexte (miniatures collection + révélation d'œuf) */
function paintCreature(ctx,id,ox,oy,sc,mo,blink,still,moving,faceRight){
  const cr=CREATURES[id]||CREATURES.heros;
  if(cr.gif){
    const im=still?gifStill(id):gifFrame(id,moving); if(!im)return;
    /* sprite de profil (dessiné regardant à GAUCHE) : miroir quand il regarde à droite */
    const flip=!!(cr.profile&&faceRight);
    if(flip){ctx.save();ctx.translate(2*(ox+18*sc/2),0);ctx.scale(-1,1);}
    const g=gifData(id), bb=gifBBox(id);
    ctx.imageSmoothingEnabled=false;
    const box=18*sc;                                   // case allouée à la créature
    const cible=box*(cr.gscale||GIF_FILL);             // hauteur voulue pour le DESSIN
    const kRaw=cible/(bb?bb.h:g.h);
    const k=cr.gk||Math.max(1,Math.round(kRaw));
    /* `gzoom` = rattrapage quand le dessin n'occupe pas assez son cadre 32×32 et paraît
       plus petit que les créatures dessinées. */
    let z=k*(cr.gzoom||1);
    if(kRaw<0.85)z=kRaw*(cr.gzoom||1);   // loin dans la scène : réduction lissée (perspective)
    const dw=Math.round(g.w*z), dh=Math.round(g.h*z);
    const zx=dw/g.w, zy=dh/g.h;                        // échelle réellement appliquée
    /* créature « au sol » (ex. le blob) : on l'ancre par le bas de SA frame courante,
       pas par l'union — son ombre reste ainsi collée à sa base à chaque instant. */
    const bbA=(cr.ground&&gifFrameBBox(id,still?0:(gifRT(id)||{}).idx||0))||bb;
    const cxOff=bbA?(bbA.x0+bbA.w/2)*zx:dw/2;          // centre horizontal du dessin
    const basOff=bbA?(bbA.y1+1)*zy:dh;                 // bas du dessin → posé sur la ligne de sol
    /* échelle entière → plus proche voisin direct ; sinon version pré-calculée stable */
    const src=(dw===g.w*Math.round(z)&&dh===g.h*Math.round(z))?im:gifScaledFrame(id,im,dw,dh);
    ctx.drawImage(src, Math.round(ox+box/2-cxOff), Math.round(oy+box*GIF_BASE-basOff), dw, dh);
    if(flip)ctx.restore();
    return;
  }
  const skin=cr.useColor?((COLORS[S.cosmetics.color]||COLORS.bleu).hex):cr.skin;
  const P=(px,py,col)=>{ctx.fillStyle=col;ctx.fillRect(ox+px*sc,oy+py*sc,sc,sc);};
  (MODELDRAW[id]||MODELDRAW.heros)(P,skin,"#0c0a17",mo||"happy",blink||false);
}
/* Vignette FIGÉE du catalogue : le dessin d'origine, à sa taille native, jamais animé */
function paintStill(cv,id){
  const cr=CREATURES[id]||CREATURES.heros, ctx=cv.getContext("2d");
  ctx.clearRect(0,0,cv.width,cv.height);
  if(cr.gif){
    const r=gifRT(id); if(!r)return;
    const im=r.imgs[0]; if(!im)return;
    if(!im.complete||!im.naturalWidth){im.addEventListener("load",()=>paintStill(cv,id),{once:true});return;}
    ctx.imageSmoothingEnabled=false; ctx.drawImage(im,0,0);
    return;
  }
  paintCreature(ctx,id,0,0,1);
}
function drawAcc(P,dark){
  const a=S.cosmetics.acc;
  if(a==="lunettes"){for(let px=5;px<=12;px++)P(px,7,dark);   // lunettes de soleil : verres opaques
    P(6,8,dark);P(7,8,dark);P(10,8,dark);P(11,8,dark);
    P(5,8,dark);P(12,8,dark);}
  else if(a==="chapeau"){for(let px=3;px<=14;px++)P(px,3,"#3a1f2a");
    for(let px=5;px<=12;px++)P(px,2,"#7a3244");for(let px=6;px<=11;px++)P(px,1,"#7a3244");}
  else if(a==="couronne"){
    for(let px=5;px<=12;px++)P(px,3,"#e8a92e");                 // bandeau (centré sur 8,5)
    [5,8,9,12].forEach(px=>{P(px,2,"#ffd056");P(px,1,"#ffd056");}); // 4 pointes symétriques
    P(8,2,"#ff5d6c");P(9,2,"#ff5d6c");                          // joyau central
  }
}
function drawAvatar(mo){
  mo=mo||mood();
  const c=document.getElementById("avatar"); if(!c)return;
  const id=S.cosmetics.model, g=(CREATURES[id]||{}).gif?gifData(id):null;
  const n=g?g.w:18;                      // les créatures GIF gardent leur résolution native
  if(c.width!==n){c.width=n;c.height=n;}
  const x=c.getContext("2d"); x.clearRect(0,0,c.width,c.height);
  c.className=(FRAMES[S.cosmetics.frame]||FRAMES.none).cls;
  if(g){                                 // créature GIF : image courante, 1:1, sans déformation
    /* le camp est l'animateur quand il est ouvert ; le HUD ne fait alors que lire */
    const im=launchOpen?gifPeek(id):gifFrame(id);
    if(im){x.imageSmoothingEnabled=false;x.drawImage(im,0,0);}
    return;
  }
  const skin=(COLORS[S.cosmetics.color]||COLORS.bleu).hex, dark="#0c0a17";
  const oy=animBob;
  const P=(px,py,col)=>{ if(py+oy<0)return; x.fillStyle=col; x.fillRect(px,py+oy,1,1); };
  (MODELDRAW[id]||MODELDRAW.heros)(P,skin,dark,mo,animBlink);
  drawAcc(P,dark);
}

/* ================= Rendu onglets & liste ================= */
let cur="principale";
let questSub="principale";  // sous-onglet actif (principale/secondaire) sous "Quêtes"
let celebrateUntil=0;       // l'avatar célèbre jusqu'à cet instant
let viewDow=null;   // jour de la semaine visualisé dans Principales/Secondaires (0=Lun)
let weekOpen=false; // routine de la semaine dépliée dans l'Agenda
let doneOpen=false; // tiroir "faites aujourd'hui" déplié
function renderTabs(){
  const el=document.getElementById("tabs");el.innerHTML="";
  /* Boutique et Réglages ne vivent plus ici : on y accède par le camp (nid / tente).
     Sur ces pages, la barre ne montre que la porte, centrée. */
  const solo=(cur==="boutique"||cur==="parametres");
  el.classList.toggle("solo",solo);
  if(!solo)TABS.filter(t=>t.id!=="boutique"&&t.id!=="parametres").forEach(t=>{
    const n=countFor(t.id);
    const active = t.id==="quetes" ? (cur==="principale"||cur==="secondaire") : (t.id===cur);
    const b=document.createElement("button");
    b.className="navitem"+(active?" on":"");
    b.innerHTML=`<span class="ic">${t.ic}</span>${t.name}<span class="badge-n">${n||""}</span>`;
    b.onclick=()=>{ cur = (t.id==="quetes") ? questSub : t.id; renderTabs();renderList();animTab(); };
    el.appendChild(b);
  });
  /* La porte : retour au campement */
  const d=document.createElement("button");
  d.className="navitem";
  d.setAttribute("aria-label","Retour au camp");
  d.innerHTML=`<span class="ic"><span class="door-ico"></span></span>Camp<span class="badge-n"></span>`;
  d.onclick=showLaunch;
  el.appendChild(d);
  updateFab(); updateMedal();
}
function updateFab(){
  const f=document.getElementById("fab"); if(!f)return;
  f.classList.toggle("hidden", cur==="history"||cur==="boutique"||cur==="parametres");
}
function updateMedal(){
  const m=document.getElementById("medalBtn"); if(!m)return;
  m.classList.toggle("on", cur==="achievement");
  const b=document.getElementById("medalBadge"); if(b)b.textContent=countFor("achievement")||"";
}
function fabAction(){
  if(cur==="evenement")openEventForm();
  else if(cur==="achievement")openAchForm();
  else if(cur==="secondaire")openAdd(null,"secondaire");
  else openAdd(null,"principale");
}
function animTab(){
  const q=document.getElementById("quests"); if(!q)return;
  q.style.animation="none"; void q.offsetWidth; q.style.animation="";
}
// Swipe horizontal (mobile) : glisse gauche => onLeft, droite => onRight
function addSwipe(el,onLeft,onRight){
  let x0=null,y0=null;
  el.addEventListener("touchstart",e=>{const t=e.changedTouches[0];x0=t.clientX;y0=t.clientY;},{passive:true});
  el.addEventListener("touchend",e=>{
    if(x0==null)return; const t=e.changedTouches[0];
    const dx=t.clientX-x0, dy=t.clientY-y0;
    if(Math.abs(dx)>45 && Math.abs(dx)>Math.abs(dy)*1.4){ dx<0?onLeft():onRight(); }
    x0=y0=null;
  },{passive:true});
}
function countFor(id){
  if(id==="boutique"||id==="parametres"||id==="history")return "";
  if(id==="quetes")return S.quests.filter(x=>x.type==="principale"&&isActiveToday(x)&&!x.doneToday&&!x.abandonedToday).length
    + S.quests.filter(x=>x.type==="secondaire"&&(x.rec==="oneshot"?!x.doneToday:(isActiveToday(x)&&!x.doneToday&&!x.abandonedToday))).length;
  if(id==="achievement")return S.achievements.filter(a=>!a.done).length;
  if(id==="principale")return S.quests.filter(x=>x.type==="principale"&&isActiveToday(x)&&!x.doneToday&&!x.abandonedToday).length;
  if(id==="secondaire")return S.quests.filter(x=>x.type==="secondaire"&&(x.rec==="oneshot"?!x.doneToday:(isActiveToday(x)&&!x.doneToday&&!x.abandonedToday))).length;
  return S.quests.filter(x=>x.type===id).length;
}

function renderList(){
  const tab=TABS.find(t=>t.id===cur)||{title:"",sub:""};
  document.getElementById("listTitle").textContent=tab.title;
  document.getElementById("listSub").textContent=tab.sub;
  const el=document.getElementById("quests");el.innerHTML="";
  if(cur==="achievement"){renderAchievements();return;}
  if(cur==="parametres"){renderSettings();return;}
  if(cur==="boutique"){renderShopTab();return;}
  if(cur==="evenement"){renderAgenda();return;}
  if(cur==="history"){renderHistory();return;}
  if(cur==="secondaire"){renderDayView("secondaire");return;}
  renderDayView("principale");
}
function card(it){
  const d=document.createElement("div");d.className="box quest";
  const t=TYPES[it.type]||TYPES.secondaire;
  let meta="";
  if(cur==="reussie"){
    meta=`<span class="chip gold">+${it.gain} XP</span><span class="chip">${"★".repeat(it.rating)}</span>`;
  }else if(it.type==="evenement"){
    const days=daysTo(it.date);
    const cd = days<0?"Passé" : days===0?"Aujourd'hui !" : days===1?"Demain":`Dans ${days} jours`;
    meta=`<span class="chip blue">${TYPES.evenement.label}</span><span class="countdown">⏳ ${cd}</span>`;
  }else{
    meta=`<span class="chip ${t.chip}">${t.label}</span>`;
    meta+=`<span class="chip">${recLabel(it)}</span>`;
    if(it.time)meta+=`<span class="chip blue">🕐 ${it.time}</span>`;
    if(it.dur>0)meta+=`<span class="chip gold">⏱ ${it.dur} min</span>`;
  }
  d.innerHTML=`
    <div class="q-ic">${it.icon}</div>
    <div class="q-body">
      <div class="q-title">${esc(it.title)}</div>
      <div class="q-meta">${meta}</div>
      <div class="q-actions"></div>
    </div>`;
  const act=d.querySelector(".q-actions");

  if(cur==="reussie"){ act.remove(); }
  else if(cur==="abandonnee"){
    add(act,"↻ Relancer","btn gold",()=>relance(it));
  }else if(it.type==="evenement"){
    add(act,"✔ Fait","btn go",()=>quickDone(it,40));
    add(act,"🗑 Retirer","btn ghost",()=>{S.quests=S.quests.filter(x=>x.id!==it.id);persist();});
  }else if(it.type==="secondaire"){
    if(it.dur>0) add(act,"▶ Accepter","btn go",()=>startTimer(it));
    else add(act,"✔ Valider","btn go",()=>completeFlow(it));
    add(act,"✎","btn ghost",()=>openAdd(it));
  }else{ // principale
    if(it.dur>0) add(act,"▶ Accepter","btn go",()=>startTimer(it));
    else add(act,"✔ Valider","btn go",()=>completeFlow(it));
    add(act,"⏰ Repousser","btn ghost",()=>{toast("Repoussée ⏰");});
    add(act,"✖ Refuser","btn no",()=>abandon(it));
    add(act,"✎","btn ghost",()=>openAdd(it));
  }
  return d;
}
function add(p,txt,cls,fn){const b=document.createElement("button");b.className=cls+" pix";b.textContent=txt;b.onclick=fn;p.appendChild(b)}
function daysTo(date){const a=new Date(today()),b=new Date(date);return Math.round((b-a)/864e5)}
function esc(s){return s.replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]))}

/* ================= Vue jour par jour (Principales / Secondaires) ================= */
function histStatus(H,title){
  if(H){
    const d=(H.done||[]).find(x=>x.title===title); if(d)return{type:"done",rating:d.rating,gain:d.gain};
    if((H.abandoned||[]).some(x=>x.title===title))return{type:"abandoned"};
  }
  return{type:"notdone"};
}
function statusCard(it,status,info){
  info=info||{};
  const d=document.createElement("div");d.className="box quest sc-"+status;
  const t=TYPES[it.type]||TYPES.secondaire;
  let badge="•",meta="";
  if(status==="done"){badge="✔";meta=`<span class="chip gold">+${info.gain||0} XP</span>${info.rating?`<span class="chip">${"★".repeat(info.rating)}</span>`:""}`;}
  else if(status==="abandoned"){badge="✖";meta=`<span class="chip">abandonnée</span>`;}
  else if(status==="notdone"){badge="✖";meta=`<span class="chip">non faite</span>`;}
  else {badge="○";meta=`<span class="chip ${t.chip}">${t.label}</span>${it.time?`<span class="chip blue">🕐 ${it.time}</span>`:""}`;}
  d.innerHTML=`<div class="q-ic">${it.icon}</div><div class="q-body"><div class="q-title">${esc(it.title)}</div><div class="q-meta">${meta}</div></div><div class="sc-badge">${badge}</div>`;
  return d;
}
function dayComplete(){
  const act=S.quests.filter(x=>(x.type==="principale"||x.type==="secondaire")&&!x.abandonedToday&&(x.rec==="oneshot"||isActiveToday(x)));
  return act.length>0 && act.every(x=>x.doneToday) && S.done.length>0;
}
function victoryBanner(full){
  const d=document.createElement("div");d.className="victory";
  d.innerHTML=`<div class="victory-rays"></div>
    <div class="victory-ic">🏆</div>
    <div class="victory-t">${full?"Journée accomplie !":"Tout est fait ici !"}</div>
    <div class="victory-s">${full?"Toutes tes quêtes du jour sont validées. Bravo, héros.":"Cette liste est vidée. Continue sur ta lancée !"}</div>`;

function renderDayView(type){
  const el=document.getElementById("quests");el.innerHTML="";
  // sélecteur Principales / Secondaires (raccourci en haut)
  const qseg=document.createElement("div");qseg.className="qseg";
  qseg.innerHTML=`<button class="${type==="principale"?"on":""}" data-t="principale">⚔️ Principales</button><button class="${type==="secondaire"?"on":""}" data-t="secondaire">✨ Secondaires</button>`;
  el.appendChild(qseg);
  qseg.querySelectorAll("[data-t]").forEach(b=>b.onclick=()=>{cur=b.dataset.t;questSub=cur;renderTabs();renderList();animTab();});
  if(viewDow==null)viewDow=todayDow();
  const now=new Date(), mon=mondayOf(now);
  const selDate=new Date(mon);selDate.setDate(mon.getDate()+viewDow);
  const selIso=isoOf(selDate), todayIso=isoOf(now);
  const rel = selIso<todayIso?"past":(selIso>todayIso?"future":"today");
  const relTxt = rel==="today"?" · aujourd'hui":rel==="past"?" · rétro":" · à venir";
  // Bande de 7 jours (saut direct)
  const strip=document.createElement("div");strip.className="week-strip";
  for(let i=0;i<7;i++){
    const dte=new Date(mon);dte.setDate(mon.getDate()+i);const iso=isoOf(dte);
    const hasQ = S.quests.some(x=>x.type===type&&x.rec!=="oneshot"&&(x.days||[]).includes(i))
      || (type==="principale"&&S.quests.some(x=>x.type==="evenement"&&x.date===iso));
    const p=document.createElement("button");
    p.className="wd-pill"+(i===viewDow?" sel":"")+(iso===todayIso?" today":"");
    p.innerHTML=`<span class="d">${DOWC[i]}</span><span class="n">${dte.getDate()}</span><span class="dot" style="visibility:${hasQ?"visible":"hidden"}"></span>`;
    p.onclick=()=>{viewDow=i;renderList();};
    strip.appendChild(p);
  }
  el.appendChild(strip);
  const nav=document.createElement("div");nav.className="day-nav";
  nav.innerHTML=`<div class="day-lbl${rel==="today"?" now":""}">${DOWL[viewDow]} ${selDate.getDate()}/${selDate.getMonth()+1}${relTxt}</div>`;
  el.appendChild(nav);
  const list=document.createElement("div");list.className="quests";el.appendChild(list);
  const H=S.history[selIso];
  const byTime=(a,b)=>(a.time||"99").localeCompare(b.time||"99");
  const scheduled=S.quests.filter(x=>x.type===type&&x.rec!=="oneshot"&&(x.days||[]).includes(viewDow)).sort(byTime);
  const events = type==="principale"?S.quests.filter(x=>x.type==="evenement"&&x.date===selIso).sort(byTime):[];
  const spont = rel==="today"?S.quests.filter(x=>x.type===type&&x.rec==="oneshot"&&!x.doneToday&&!x.abandonedToday):[];
  let any=false; const emit=n=>{list.appendChild(n);any=true;};
  const doneList=[];
  const dinfo=(it)=>{const r=[...S.done].reverse().find(x=>x.title===it.title);return r?{gain:r.gain,rating:r.rating}:{};};
  const render=(it)=>{
    if(rel==="today"){
      if(it.doneToday)doneList.push(it);               // rangé dans le tiroir 🏆
      else if(it.abandonedToday)emit(statusCard(it,"abandoned"));
      else emit(card(it));
    }else if(rel==="past"){
      const st=histStatus(H,it.title); emit(statusCard(it,st.type,st));
    }else emit(statusCard(it,"preview"));
  };
  /* Toutes les quêtes du jour sont mélangées puis rangées par heure croissante,
     quel que soit leur type (tous les jours / certains jours / one shot / événement).
     Celles sans heure ferment la marche. */
  const rows=[];
  scheduled.forEach(it=>rows.push({it,run:()=>render(it)}));
  events.forEach(it=>rows.push({it,run:()=>{
    if(rel==="today")emit(card(it));
    else if(rel==="past"){const st=histStatus(H,it.title);emit(statusCard(it,st.type,st));}
    else emit(statusCard(it,"preview"));}}));
  spont.forEach(it=>rows.push({it,run:()=>emit(card(it))}));
  rows.sort((a,b)=>byTime(a.it,b.it)).forEach(r=>r.run());
  if(!any){
    if(rel==="today" && doneList.length>0){
      list.appendChild(victoryBanner(dayComplete()));
    }else if(!doneList.length){
      const e=document.createElement("div");e.className="empty";
      e.innerHTML=`<span class="big">${rel==="future"?"🗓️":rel==="past"?"📭":"😌"}</span>${rel==="today"?"Rien de prévu aujourd'hui. Touche le bouton ✚ pour en ajouter.":rel==="future"?"Rien de prévu ce jour-là.":"Aucune quête enregistrée ce jour-là."}`;
      list.appendChild(e);
    }
  }
  // Tiroir "faites aujourd'hui" (🏆)
  if(doneList.length){
    const btn=document.createElement("button");btn.className="btn pix wide";btn.style.marginTop="12px";
    btn.textContent=`🏆 Faites aujourd'hui (${doneList.length}) ${doneOpen?"▾":"▸"}`;
    btn.onclick=()=>{doneOpen=!doneOpen;renderList();};
    el.appendChild(btn);
    if(doneOpen){const dl=document.createElement("div");dl.className="quests";dl.style.marginTop="8px";
      doneList.forEach(it=>dl.appendChild(statusCard(it,"done",dinfo(it))));el.appendChild(dl);}
  }
}

/* ================= Actions de jeu ================= */
function persist(){save();renderHUD();renderTabs();renderList();}

function abandon(it){
  const o=S.quests.find(x=>x.id===it.id);
  if(o){o.abandonedToday=true;} else {it.abandonedToday=true;S.quests.push(it);}
  S.streak=0;                     // on casse la série
  toast("Quête abandonnée 💤");
  persist();
}
function relance(it){
  const o=S.quests.find(x=>x.id===it.id);
  if(o)o.abandonedToday=false;
  cur=(o?o.type:it.type); toast("Quête relancée ↻");
  persist();
}
function quickDone(it,base){ completeFlow(it,base); }

function award(it,rating,base){
  const b=base||it.base||(TYPES[it.type]?.base)||25;
  const gain=Math.round(b*(0.5+rating*0.1)*multiplier());
  S.xpTotal+=gain; S.coins+=gain;
  S.streak++; S.best=Math.max(S.best,S.streak);
  S.totalDone=(S.totalDone||0)+1;
  // récurrente → marquée faite pour aujourd'hui ; oneshot / événement → retirée
  if(it.rec && it.rec!=="oneshot"){ const o=S.quests.find(x=>x.id===it.id); if(o)o.doneToday=true; }
  else                             { S.quests=S.quests.filter(x=>x.id!==it.id); }
  S.done.push({title:it.title,icon:it.icon,gain,rating,type:it.type});
  celebrate(); victorySound();
  toast(`+${gain} XP · +${gain} 🪙 !`);
  persist();
}

/* ---- Flow de notation (auto-évaluation du sérieux) ---- */
function completeFlow(it,base){
  let rating=4;
  const labels=["","Bâclé 😐","Moyen","Correct","Sérieux 💪","Parfait ⭐"];
  openModal(`
    <h2>Quête accomplie</h2>
    <p class="hint">${esc(it.title)} — note ton sérieux, ça influence l'XP.</p>
    <div class="stars" id="stars"></div>
    <div class="rate-label" id="rlab">${labels[4]}</div>
    <div class="modal-actions">
      <button class="btn ghost pix" id="cancel">Annuler</button>
      <button class="btn gold pix" id="ok">Valider ✔</button>
    </div>`);
  const sc=document.getElementById("stars");
  function paint(){[...sc.children].forEach((s,i)=>{const on=i<rating;s.classList.toggle("on",on);s.textContent=on?"★":"☆";});document.getElementById("rlab").textContent=labels[rating];}
  for(let i=1;i<=5;i++){const s=document.createElement("span");s.className="star";s.textContent="☆";s.onclick=()=>{rating=i;paint();};sc.appendChild(s);}
  paint();
  document.getElementById("cancel").onclick=closeModal;
  document.getElementById("ok").onclick=()=>{closeModal();award(it,rating,base);};
}

/* ---- Chrono ---- */
let timer=null;
function startTimer(it){
  let elapsed=0, target=it.dur*60, running=true;
  openModal(`
    <h2>⏱ ${esc(it.title)}</h2>
    <p class="hint">Objectif : ${it.dur} min. Tu peux mettre en pause en cas d'urgence.</p>
    <div class="timer-display" id="tdisp">00:00</div>
    <div class="timer-target">/ ${String(it.dur).padStart(2,"0")}:00 objectif</div>
    <div class="timer-ring"><i id="tring"></i></div>
    <div class="modal-actions">
      <button class="btn pix" id="pause">⏸ Pause</button>
      <button class="btn go pix" id="finish">✔ Terminer</button>
    </div>
    <div style="margin-top:8px"><button class="btn no pix wide" id="giveup" style="justify-content:center;display:flex">✖ Abandonner</button></div>`);
  const disp=document.getElementById("tdisp"),ring=document.getElementById("tring");
  function fmt(s){return String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0")}
  timer=setInterval(()=>{ if(!running)return; elapsed++; disp.textContent=fmt(elapsed);
    ring.style.width=Math.min(100,100*elapsed/target)+"%";
    if(elapsed===target){disp.style.color="var(--green)";victorySound();} },1000);
  document.getElementById("pause").onclick=e=>{running=!running;e.target.textContent=running?"⏸ Pause":"▶ Reprendre";disp.style.opacity=running?1:.5;};
  document.getElementById("finish").onclick=()=>{clearInterval(timer);closeModal();completeFlow(it);};
  document.getElementById("giveup").onclick=()=>{clearInterval(timer);closeModal();abandon(it);};
}

/* ================= Agenda / calendrier ================= */
let calY=null, calM=null;
const MONTHS=["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
function remLabel(min){ if(min>=1440)return (min/1440)+" j"; if(min>=60)return (min/60)+" h"; return min+" min"; }
function evSort(a,b){return (a.date+(a.time||"99")).localeCompare(b.date+(b.time||"99"));}
function pad2(n){return String(n).padStart(2,"0");}

function renderAgenda(){
  const root=document.getElementById("quests");
  if(calY==null){const n=new Date();calY=n.getFullYear();calM=n.getMonth();}
  const first=new Date(calY,calM,1);
  const startDow=(first.getDay()+6)%7; // Lundi=0
  const days=new Date(calY,calM+1,0).getDate();
  const dow=["L","M","M","J","V","S","D"];
  const todayStr=today();
  let cells="";
  for(let i=0;i<startDow;i++)cells+=`<div class="cal-cell other"></div>`;
  for(let d=1;d<=days;d++){
    const ds=`${calY}-${pad2(calM+1)}-${pad2(d)}`;
    const evs=S.quests.filter(x=>x.type==="evenement"&&x.date===ds);
    const dots=evs.slice(0,3).map(()=>`<i></i>`).join("");
    cells+=`<div class="cal-cell${ds===todayStr?" today":""}${evs.length?" has":""}" data-day="${ds}"><span>${d}</span><div class="cal-dots">${dots}</div></div>`;
  }
  const canNotif=("Notification" in window);
  const notifBtn = canNotif && Notification.permission!=="granted"
    ? `<button class="btn ghost pix" id="notifBtn" style="font-size:9px;flex:0 0 auto">🔔 Activer</button>` : "";
  root.innerHTML=`
    <div class="cal">
      <div class="cal-head">
        <button class="btn pix" id="calPrev">◀</button>
        <div class="cal-title">${MONTHS[calM]} ${calY}</div>
        <button class="btn pix" id="calNext">▶</button>
      </div>
      <div class="cal-dow">${dow.map(x=>`<span>${x}</span>`).join("")}</div>
      <div class="cal-grid">${cells}</div>
    </div>
    <div style="display:flex;gap:8px;margin:12px 0">
      <button class="btn gold pix" id="addEv" style="flex:1;justify-content:center;display:flex">✚ Événement</button>
      ${notifBtn}
    </div>
    <button class="btn pix wide" id="toggleWeek" style="margin:2px 0 4px">🗓️ Routine de la semaine ${weekOpen?"▾":"▸"}</button>
    <div id="weekBlock" style="display:${weekOpen?"block":"none"}">
      <div class="list-sub" style="margin:6px 0 8px">Quêtes récurrentes + événements de la semaine. Touche une ligne pour la modifier ou la supprimer.</div>
      <button class="btn ghost pix" id="addRoutine" style="margin-bottom:10px">✚ Nouvelle routine</button>
      <div id="weekWrap"></div>
    </div>
    <div class="list-title" style="margin:14px 0 8px">Événements à venir</div>
    <div class="quests" id="upcoming"></div>`;
  document.getElementById("calPrev").onclick=()=>{calM--;if(calM<0){calM=11;calY--;}renderAgenda();};
  document.getElementById("calNext").onclick=()=>{calM++;if(calM>11){calM=0;calY++;}renderAgenda();};
  document.getElementById("addEv").onclick=()=>openEventForm();
  document.getElementById("toggleWeek").onclick=()=>{weekOpen=!weekOpen;renderAgenda();};
  const ar=document.getElementById("addRoutine"); if(ar)ar.onclick=()=>openAdd();
  const nb=document.getElementById("notifBtn"); if(nb)nb.onclick=askNotif;
  root.querySelectorAll("[data-day]").forEach(c=>c.onclick=()=>openEventForm({date:c.dataset.day}));
  if(weekOpen)renderWeek();
  const up=document.getElementById("upcoming");
  const list=S.quests.filter(x=>x.type==="evenement"&&daysTo(x.date)>=0).sort(evSort).slice(0,6);
  if(!list.length)up.innerHTML=`<div class="empty"><span class="big">📅</span>Aucun événement à venir. Clique sur un jour ou sur ✚ Événement.</div>`;
  else list.forEach(it=>up.appendChild(eventCard(it)));
}
function eventCard(it){
  const d=document.createElement("div");d.className="box quest";
  const dd=new Date(it.date+"T00:00");
  const dstr=dd.toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"short"});
  const days=daysTo(it.date);
  const cd = days<0?"passé":days===0?"aujourd'hui !":days===1?"demain":`J-${days}`;
  let chips=`<span class="chip blue">${dstr}</span>`;
  if(it.time)chips+=`<span class="chip gold">🕐 ${it.time}</span>`;
  chips+=`<span class="countdown">⏳ ${cd}</span>`;
  if(it.reminder>0)chips+=`<span class="chip">🔔 -${remLabel(it.reminder)}</span>`;
  d.innerHTML=`<div class="q-ic">${it.icon}</div><div class="q-body"><div class="q-title">${esc(it.title)}</div><div class="q-meta">${chips}</div><div class="q-actions"></div></div>`;
  const act=d.querySelector(".q-actions");
  add(act,"✔ Fait","btn go",()=>quickDone(it,40));
  add(act,"✎ Modifier","btn ghost",()=>openEventForm(it));
  add(act,"🗑","btn ghost",()=>{S.quests=S.quests.filter(x=>x.id!==it.id);persist();});
  return d;
}
let weekDow=null;   // jour affiché dans la routine de la semaine
function renderWeek(){
  const wrap=document.getElementById("weekWrap"); if(!wrap)return;
  if(weekDow==null)weekDow=todayDow();
  const mon=mondayOf(new Date()); const todayIso=isoOf(new Date());
  const byTime=(a,b)=>(a.time||"99").localeCompare(b.time||"99");
  // bande de jours (horizontal, tappable + swipe)
  let strip=`<div class="week-strip">`;
  for(let i=0;i<7;i++){
    const dte=new Date(mon);dte.setDate(mon.getDate()+i);const iso=isoOf(dte);
    const has=S.quests.some(x=>(x.type==="principale"||x.type==="secondaire")&&x.rec!=="oneshot"&&(x.days||[]).includes(i))
      || S.quests.some(x=>x.type==="evenement"&&x.date===iso);
    strip+=`<button class="wd-pill${i===weekDow?" sel":""}${iso===todayIso?" today":""}" data-wd="${i}"><span class="d">${DOWC[i]}</span><span class="n">${dte.getDate()}</span><span class="dot" style="visibility:${has?"visible":"hidden"}"></span></button>`;
  }
  strip+=`</div>`;
  // contenu du jour sélectionné
  const dte=new Date(mon);dte.setDate(mon.getDate()+weekDow);const ds=isoOf(dte);
  const routine=S.quests.filter(x=>(x.type==="principale"||x.type==="secondaire")&&x.rec!=="oneshot"&&(x.days||[]).includes(weekDow)).sort(byTime);
  const evs=S.quests.filter(x=>x.type==="evenement"&&x.date===ds).sort(byTime);
  let rows="";
  /* routines et événements mélangés, rangés par heure croissante */
  [...routine.map(x=>({x,ev:false})),...evs.map(x=>({x,ev:true}))]
    .sort((a,b)=>byTime(a.x,b.x))
    .forEach(({x,ev})=>{ rows+= ev
      ? `<div class="wk-item ev" data-eid="${x.id}">${x.time?`<b>${x.time}</b> `:""}${x.icon} ${esc(x.title)}</div>`
      : `<div class="wk-item" data-qid="${x.id}">${x.time?`<b>${x.time}</b> `:""}${x.icon} ${esc(x.title)} <span class="wk-tag ${x.type==="principale"?"p":"s"}">${x.type==="principale"?"Principale":"Secondaire"}</span></div>`; });
  if(!rows)rows=`<div class="wk-empty" style="padding:14px 4px">— repos / rien ce jour-là —</div>`;
  wrap.innerHTML=strip+`<div class="wk-list" id="wkList" style="margin-top:8px">${rows}</div>`;
  // navigation
  wrap.querySelectorAll("[data-wd]").forEach(p=>p.onclick=()=>{weekDow=+p.dataset.wd;renderWeek();});
  wrap.querySelectorAll("[data-qid]").forEach(el=>el.onclick=()=>{const it=S.quests.find(x=>x.id===el.dataset.qid);if(it)openAdd(it);});
  wrap.querySelectorAll("[data-eid]").forEach(el=>el.onclick=()=>{const it=S.quests.find(x=>x.id===el.dataset.eid);if(it)openEventForm(it);});
  addSwipe(document.getElementById("wkList"), ()=>{if(weekDow<6){weekDow++;renderWeek();}}, ()=>{if(weekDow>0){weekDow--;renderWeek();}});
}
function openEventForm(pref){
  pref=pref||{};

    <div class="field"><label>Titre</label><input id="eTitle" maxlength="42" value="${esc(pref.title||"")}" placeholder="Ex : Concert, RDV médecin"></div>

  const ir=document.getElementById("eIcons");

  set.forEach(ic=>{const s=document.createElement("div");s.className="icon-pick"+(icon===ic?" on":"");s.textContent=ic;
