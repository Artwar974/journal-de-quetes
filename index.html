/* ---- tirage pondéré par rareté ---- */
function rollRarity(){let r=Math.random()*100,acc=0;
  for(const k of RARITY_ORDER){acc+=RARITY[k].odds;if(r<acc)return k;}return"commun";}
function pullCreature(){
  const rar=rollRarity();
  const inRar=Object.keys(CREATURES).filter(id=>CREATURES[id].rar===rar);
  const unowned=inRar.filter(id=>!S.creatures.owned.includes(id));
  const pool=unowned.length?unowned:inRar;
  const id=pool[Math.floor(Math.random()*pool.length)];
  const dup=S.creatures.owned.includes(id);
  if(!dup)S.creatures.owned.push(id);
  S.creatures.counts[id]=(S.creatures.counts[id]||0)+1;
  return {id,rar,dup};
}
function buyEgg(){
  if(S.coins<EGG_COST){toast("Pas assez de pièces 🪙");return;}
  S.coins-=EGG_COST;
  const res=pullCreature();
  if(res.dup){res.refund=Math.round(EGG_COST*0.4);S.coins+=res.refund;}
  save();renderHUD();
  playHatch(res);
}

/* ---- dessin d'un œuf (miniature + animation) ---- */
function drawEgg(x,cx,cy,sc,crackLvl){
  const R=(a,b,w,h,c)=>{x.fillStyle=c;x.fillRect(a|0,b|0,Math.max(1,w|0),Math.max(1,h|0));};
  const w=13*sc,h=17*sc;
  x.fillStyle="#e8d9b8";x.beginPath();x.ellipse(cx,cy,w/2,h/2,0,0,7);x.fill();
  x.fillStyle="#f6eeda";x.beginPath();x.ellipse(cx-w*0.12,cy-h*0.14,w*0.22,h*0.2,0,0,7);x.fill();
  x.fillStyle="#c8a86a";
  R(cx-w*0.28,cy-h*0.05,3*sc,2*sc,"#c8a86a");R(cx+w*0.1,cy+h*0.12,3*sc,2*sc,"#c8a86a");
  R(cx-w*0.1,cy+h*0.24,2*sc,2*sc,"#c8a86a");R(cx+w*0.16,cy-h*0.2,2*sc,2*sc,"#c8a86a");
  x.fillStyle="#8a6a3c";x.beginPath();x.ellipse(cx,cy+h*0.44,w*0.42,h*0.09,0,0,7);x.fill();
  if(crackLvl>0){x.strokeStyle="#3a2416";x.lineWidth=Math.max(1,sc);
    x.beginPath();x.moveTo(cx-w*0.3,cy-h*0.2);x.lineTo(cx-w*0.05,cy);x.lineTo(cx-w*0.2,cy+h*0.12);
    if(crackLvl>1)x.lineTo(cx+w*0.05,cy+h*0.28);
    x.moveTo(cx-w*0.05,cy);x.lineTo(cx+w*0.22,cy-h*0.08);x.stroke();}
}
/* Maillet dessiné autour de son POIGNÉE (pivot à l'origine) : le manche part vers +X,
   la grosse tête est au bout. Permet de basculer de la verticale à l'horizontale. */
const MALLET_L=78;                 // longueur du manche (pivot → centre de la tête)
function drawMallet(x,pivX,pivY,ang){
  const L=MALLET_L, hw=25, hh=35;  // demi-épaisseur (axe manche) / demi-longueur de la tête
  x.save();x.translate(pivX,pivY);x.rotate(ang);
  const R=(a,b,w,h,c)=>{x.fillStyle=c;x.fillRect(a,b,w,h);};
  R(0,-6,L-20,12,"#6a4a2c");                       // manche
  R(0,-6,L-20,4,"#83603c");
  R(0,2,L-20,4,"#4f371f");
  R(-2,-8,10,16,"#4a2f1c");                        // pommeau
  R(L-hw,-hh,hw*2,hh*2,"#8a9098");                 // tête (symétrique : lisible à toute rotation)
  R(L-hw+4,-hh+4,hw*2-8,hh*2-8,"#a8aeb6");
  R(L-hw+9,-hh+9,hw*2-18,15,"#c4cad2");            // reflet
  R(L-hw,-hh,hw*2,4,"#6a707a");
  R(L-hw,hh-4,hw*2,4,"#6a707a");
  R(L-hw+2,-hh+2,5,hh*2-4,"rgba(40,44,50,.45)");   // cerclages
  R(L+hw-7,-hh+2,5,hh*2-4,"rgba(40,44,50,.45)");
  x.restore();
}
let hatchRAF=null, hatchResult=null;
function playHatch(res){
  hatchResult=res;
  const ov=document.getElementById("hatch"), cv=document.getElementById("hatchCv");
  const card=document.getElementById("hatchCard"); card.classList.remove("show");
  ov.classList.add("on");
  const W=cv.width,H=cv.height,x=cv.getContext("2d");
  x.imageSmoothingEnabled=false;
  const R=RARITY[res.rar];
  const showCard=()=>{
    document.getElementById("hcRar").textContent=R.name.toUpperCase();
    document.getElementById("hcRar").style.color=R.col;
    document.getElementById("hcName").textContent=CREATURES[res.id].name;
    document.getElementById("hcMsg").textContent=res.dup
      ? `Déjà dans ta collection · +${res.refund} 🪙 remboursés`
      : "Nouvelle créature débloquée !";
    document.getElementById("hcEquip").style.display=res.dup&&S.cosmetics.model===res.id?"none":"";
    card.classList.add("show");
  };
  if(reduce){
    x.fillStyle="#000";x.fillRect(0,0,W,H);
    T_revealStatic(x,W,H,res,R);showCard();return;
  }
  const cx=W/2, groundY=H*0.6, sc=3;
  const pivX=cx+MALLET_L, pivY=groundY;          // pivot : la tête retombe pile sur l'œuf
  const UP=-Math.PI/2, FLAT=-Math.PI;            // manche vertical → manche horizontal
  const t0=performance.now();
  let sPoc=false,sThud=false,sMagic=false;
  (function loop(now){
    const t=now-t0;
    x.fillStyle="#000";x.fillRect(0,0,W,H);
    // halo de rareté qui monte en intensité
    const hg=Math.min(1,t/2600);
    const gr=x.createRadialGradient(cx,groundY-10,4,cx,groundY-10,120);
    gr.addColorStop(0,`rgba(${R.rgb},${(0.10+0.30*hg).toFixed(2)})`);gr.addColorStop(1,`rgba(${R.rgb},0)`);
    x.fillStyle=gr;x.fillRect(0,0,W,H);
    if(t<900){ // chute de l'œuf
      const p=t/900, ey=(-60)+(groundY-(-60))*(1-(1-p)*(1-p));
      drawEgg(x,cx,ey,sc,0);
    }else if(t<1400){ // l'œuf se pose et vibre, le maillet se dresse
      if(!sPoc){sPoc=true;sfxPoc();}
      const q=(t-900)/500;
      const w=Math.sin((t-900)/38)*2.4*Math.max(0,1-q*1.6);
      drawEgg(x,cx+w,groundY,sc,0);
      x.save();x.globalAlpha=Math.min(1,q*2.2);x.translate(0,-70*(1-Math.min(1,q*1.5)));
      drawMallet(x,pivX,pivY,UP);x.restore();
    }else if(t<1900){ // BASCULE : de la verticale à l'horizontale
      const p=(t-1400)/500, e=p*p;               // accélère en tombant
      drawEgg(x,cx,groundY,sc,p>0.75?1:0);
      drawMallet(x,pivX,pivY,UP+e*(FLAT-UP));
    }else if(t<2200){ // impact : la tête recouvre entièrement l'œuf
      if(!sThud){sThud=true;sfxThud();}
      const k=(2200-t)/300, shake=k*6;
      const sx=((t/26|0)%2?shake:-shake);
      x.save();x.translate(sx,k*2);
      drawMallet(x,pivX,pivY,FLAT);
      x.restore();
      x.globalAlpha=Math.min(.85,k*.95);x.fillStyle="#fff";x.fillRect(0,0,W,H);x.globalAlpha=1;
      for(let i=0;i<12;i++){const a=i/12*6.283,d=(t-1900)/300*52;
        x.fillStyle=i%3?"#e8d9b8":"#c8a86a";
        x.fillRect(cx+Math.cos(a)*d,groundY+Math.sin(a)*d*0.55,3,3);}
    }else{ // le maillet se relève et sort, la créature apparaît
      const p=Math.min(1,(t-2200)/560), e=1-(1-p)*(1-p);
      for(let i=0;i<10;i++){const a=i/10*6.283,d=52+p*26;
        x.globalAlpha=Math.max(0,1-p);x.fillStyle="#c8a86a";
        x.fillRect(cx+Math.cos(a)*d,groundY+Math.sin(a)*d*0.55+p*36,2,2);x.globalAlpha=1;}
      x.save();
      x.globalAlpha=Math.max(0,1-Math.max(0,(p-.55)/.45));
      x.translate(0,-e*e*250);
      drawMallet(x,pivX,pivY,FLAT+e*(UP-FLAT));
      x.restore();x.globalAlpha=1;
      const pop=Math.min(1,(t-2420)/420);
      if(pop>0){
        if(!sMagic){sMagic=true;sfxMagic();}
        const csc=sc*(0.5+0.5*Math.min(1,pop*1.2))*(pop<1?1+0.15*Math.sin(t/60):1);
        const bob=Math.sin(t/200)*csc*0.4;
        paintCreature(x,res.id, cx-9*csc, groundY-15*csc+bob, csc, "happy", false);
        for(let i=0;i<6;i++){const a=t/400+i*1.047;
          x.fillStyle=i%2?R.col:"#fff";
          x.fillRect(cx+Math.cos(a)*(24+8*Math.sin(t/300)),groundY-24+Math.sin(a)*18,2,2);}
      }
      if(t>3050 && !card.classList.contains("show"))showCard();
    }
    if(t<3550||!card.classList.contains("show")){hatchRAF=requestAnimationFrame(loop);}
    else{ // garde la créature affichée sous la carte
      x.fillStyle="#000";x.fillRect(0,0,W,H);
      const gr2=x.createRadialGradient(cx,groundY-10,4,cx,groundY-10,120);
      gr2.addColorStop(0,`rgba(${R.rgb},.32)`);gr2.addColorStop(1,`rgba(${R.rgb},0)`);
      x.fillStyle=gr2;x.fillRect(0,0,W,H);
      paintCreature(x,res.id,cx-9*sc,groundY-15*sc,sc,"happy",false);
    }
  })(t0);
}
function T_revealStatic(x,W,H,res,R){
  const cx=W/2,groundY=H*0.6,sc=3;
  const gr=x.createRadialGradient(cx,groundY-10,4,cx,groundY-10,120);
  gr.addColorStop(0,`rgba(${R.rgb},.32)`);gr.addColorStop(1,`rgba(${R.rgb},0)`);
  x.fillStyle=gr;x.fillRect(0,0,W,H);
  paintCreature(x,res.id,cx-9*sc,groundY-15*sc,sc,"happy",false);
}
